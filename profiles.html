<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CineMood — Chi sta guardando?</title>
<meta name="theme-color" content="#090b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CineMood">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090b0f;
  --surface-2:#1c232d;
  --line:#262f3b;
  --gold:#e3a857;
  --text:#f2efe9;
  --muted:#8a93a3;
  --red:#c1443a;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(1200px 600px at 15% -10%, #14202c 0%, var(--bg) 55%) fixed, var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1{font-family:'Bebas Neue','Inter',sans-serif;letter-spacing:.03em;font-weight:400;}
.brandmark{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Bebas Neue';font-size:22px;color:var(--gold);position:absolute;top:26px;left:0;right:0;}
.brandmark .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);}
.screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:40px;padding:24px;text-align:center;
}
.screen h1{font-size:44px;color:var(--gold);margin:0;}
.screen p{color:var(--muted);margin:0;font-size:14px;}
.profile-list{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;}
.profile-card{
  background:none;border:none;color:var(--text);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:6px;border-radius:16px;transition:transform .18s;font-family:inherit;
}
.profile-card:hover{transform:translateY(-4px);}
.profile-avatar{
  width:120px;height:120px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue';font-size:52px;
  border:2px solid transparent;transition:border-color .18s, box-shadow .18s;
}
.profile-card:hover .profile-avatar{border-color:var(--gold);box-shadow:0 0 0 4px rgba(227,168,87,.15);}
.profile-card span.pname{font-size:15px;font-weight:600;color:var(--muted);}
.profile-card:hover span.pname{color:var(--text);}
</style>
</head>
<body>
  <div class="brandmark"><span class="dot"></span><span>CineMood</span></div>
  <div class="screen">
    <div>
      <h1>Chi sta guardando?</h1>
      <p>Ogni profilo ha preferiti e titoli visti tutti suoi.</p>
    </div>
    <div class="profile-list" id="profileList"></div>
  </div>

<script>
const PROFILES = [
  { name:"Giuseppe", color:"#4f7cff" },
  { name:"Ricky",    color:"#e3a857" },
];
const list = document.getElementById("profileList");
PROFILES.forEach(p=>{
  const btn = document.createElement("button");
  btn.className = "profile-card";
  btn.innerHTML = `
    <span class="profile-avatar" style="background:${p.color}22;color:${p.color};border-color:${p.color}55;">${p.name[0]}</span>
    <span class="pname">${p.name}</span>
  `;
  btn.addEventListener("click", ()=>{
    location.href = "index.html?profile=" + encodeURIComponent(p.name);
  });
  list.appendChild(btn);
});
</script>
</body>
</html>
