<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CineMood — Il tuo cinema, il tuo umore</title>
<meta name="theme-color" content="#090b0f">
<meta name="description" content="Cerca film e serie TV, salva i preferiti e trova cosa guardare in base al mood.">
<!-- iOS: aggiunta a Home come app a schermo intero -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CineMood">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Android/Chrome: PWA installabile -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090b0f;
  --bg-soft:#0f1319;
  --surface:#151b23;
  --surface-2:#1c232d;
  --line:#262f3b;
  --gold:#e3a857;
  --gold-dim:#8a6a3a;
  --red:#c1443a;
  --text:#f2efe9;
  --muted:#8a93a3;
  --green:#4caf7d;
  --radius:10px;
  --shadow: 0 20px 40px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;}
body{
  background:radial-gradient(1200px 600px at 15% -10%, #14202c 0%, var(--bg) 55%) fixed, var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{
  font-family:'Bebas Neue', 'Inter', sans-serif;
  letter-spacing:.03em;
  font-weight:400;
}
::selection{background:var(--gold);color:#111;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- TOP BAR ---------- */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:24px;
  flex-wrap:wrap;
  padding:16px 28px;
  padding-top:calc(16px + env(safe-area-inset-top));
  padding-left:calc(28px + env(safe-area-inset-left));
  padding-right:calc(28px + env(safe-area-inset-right));
  background:rgba(9,11,15,.86);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-size:26px;
  color:var(--gold);
  white-space:nowrap;
}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);}
.nav{display:flex;gap:4px;flex:1;}
.nav button{
  background:none;border:none;color:var(--muted);
  padding:9px 16px;border-radius:999px;font-size:14.5px;font-weight:600;
  transition:.2s;
}
.nav button:hover{color:var(--text);}
.nav button.active{background:var(--surface-2);color:var(--gold);}
.mood-btn{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--gold),#c98936);
  color:#161005;font-weight:800;border:none;
  padding:10px 18px;border-radius:999px;font-size:14px;
  box-shadow:0 8px 24px -8px rgba(227,168,87,.6);
  transition:transform .15s ease;
  white-space:nowrap;
}
.mood-btn:hover{transform:translateY(-2px);}
.mood-btn:active{transform:translateY(0);}
.mood-btn.alt-purple{background:linear-gradient(135deg,#c9a6f5,#8b5fe0);color:#1c0f33;box-shadow:0 8px 24px -8px rgba(139,95,224,.55);}
.mood-btn.alt-teal{background:linear-gradient(135deg,#7fe3cd,#2f9e88);color:#03231d;box-shadow:0 8px 24px -8px rgba(47,158,136,.55);}

/* ---------- LAYOUT ---------- */
.view{padding:28px;max-width:1400px;margin:0 auto;}
.view[hidden]{display:none;}

.section-title{
  display:flex;align-items:baseline;gap:12px;margin:34px 0 14px;
}
.section-title h2{font-size:26px;color:var(--text);margin:0;}
.section-title .eyebrow{
  font-family:'Inter';font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold-dim);font-weight:700;
}
.section-title .rule{flex:1;height:1px;background:var(--line);}

/* platform pill row on shelf headers */
.platform-icon{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#111;}

/* ---------- SHELF ---------- */
.shelf-row{display:flex;gap:16px;overflow-x:auto;padding:6px 2px 18px;scroll-snap-type:x proximity;}
.shelf-row::-webkit-scrollbar{height:6px;}

/* ---------- POSTER CARD ---------- */
.card{
  position:relative;flex:0 0 auto;width:150px;scroll-snap-align:start;
  border-radius:var(--radius);overflow:hidden;background:var(--surface);
  border:1px solid var(--line);
  transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s;
  cursor:pointer;
}
.card:hover{transform:translateY(-6px) scale(1.03);box-shadow:var(--shadow),0 0 0 1px var(--gold-dim);z-index:2;}
.card img{display:block;width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--surface-2);}
.card .noimg{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;padding:10px;background:linear-gradient(160deg,var(--surface),var(--surface-2));}
.card .meta{padding:8px 9px 10px;}
.card .title{font-size:13px;font-weight:700;line-height:1.25;margin:0 0 4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px;}
.card .sub{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.rating-chip{
  display:inline-flex;align-items:center;gap:3px;background:rgba(227,168,87,.14);
  color:var(--gold);border-radius:5px;padding:1px 5px;font-weight:700;font-size:11px;
}
.watched-dot{
  position:absolute;top:7px;right:7px;width:11px;height:11px;border-radius:50%;
  background:var(--green);box-shadow:0 0 0 2px rgba(9,11,15,.85), 0 0 8px rgba(76,175,125,.8);
  display:none;
}
.card.is-watched .watched-dot{display:block;}
.fav-toggle{
  position:absolute;top:6px;left:6px;width:26px;height:26px;border-radius:50%;
  background:rgba(9,11,15,.65);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;
  opacity:0;transition:opacity .18s, background .18s, transform .15s;
}
.card:hover .fav-toggle{opacity:1;}
.fav-toggle.active{opacity:1;color:var(--red);background:rgba(9,11,15,.85);}
.fav-toggle:active{transform:scale(.88);}

/* empty state */
.empty{
  border:1px dashed var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;color:var(--muted);
}
.empty b{color:var(--text);}

/* ---------- SEARCH ---------- */
.filters{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;
}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;font-weight:700;}
.field input,.field select{
  width:100%;background:var(--bg-soft);border:1px solid var(--line);color:var(--text);
  padding:10px 12px;border-radius:8px;font-size:14px;outline:none;transition:border-color .15s;
}
.field input:focus,.field select:focus{border-color:var(--gold-dim);}
.field.range{display:flex;flex-direction:column;}
.field.range .val{color:var(--gold);font-weight:700;}
.search-actions{grid-column:1/-1;display:flex;gap:10px;justify-content:flex-end;margin-top:2px;}
.btn{
  border:1px solid var(--line);background:var(--surface-2);color:var(--text);
  padding:10px 18px;border-radius:8px;font-weight:700;font-size:13.5px;transition:.15s;
}
.btn:hover{border-color:var(--gold-dim);}
.btn.primary{background:var(--gold);color:#161005;border-color:var(--gold);}
.btn.primary:hover{filter:brightness(1.08);}

.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-top:22px;}

/* ---------- FAVORITES TABS ---------- */
.subtabs{display:flex;gap:8px;margin-bottom:18px;}
.subtabs button{
  background:var(--surface);border:1px solid var(--line);color:var(--muted);
  padding:8px 16px;border-radius:999px;font-weight:700;font-size:13px;
}
.subtabs button.active{color:var(--gold);border-color:var(--gold-dim);background:var(--surface-2);}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(6,7,9,.78);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:auto;}
.modal{
  background:var(--surface);border:1px solid var(--line);border-radius:16px;
  max-width:820px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 40px 80px -20px rgba(0,0,0,.8);
  transform:translateY(14px);transition:transform .2s;
}
.overlay.open .modal{transform:translateY(0);}
.modal-hero{position:relative;display:flex;gap:22px;padding:24px;}
.modal-hero img{width:160px;border-radius:10px;flex:0 0 auto;box-shadow:var(--shadow);}
.modal-close{
  position:relative;top:0;right:0;width:34px;height:34px;border-radius:50%;flex:0 0 auto;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);font-size:16px;
  pointer-events:auto;z-index:5;
}
.modal-sticky-header{
  position:sticky;top:0;z-index:20;background:var(--surface);
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  padding:22px 24px 16px;border-bottom:1px solid var(--line);
}
.modal-sticky-header h3{margin:0;font-size:28px;color:var(--text);}
.modal-sticky-header p{margin:6px 0 0;color:var(--muted);font-size:13.5px;}
.mood-body{padding:20px 24px 28px;}
.mood-filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:18px 0;}
.mood-actions{display:flex;gap:10px;justify-content:flex-end;margin-bottom:18px;}
.mood-tile.selected{border-color:var(--gold);background:var(--surface-2);box-shadow:0 0 0 2px rgba(227,168,87,.25);}
.person-link{
  background:none;border:none;color:var(--gold);font:inherit;font-weight:700;
  cursor:pointer;padding:0;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;
}
.person-link:hover{color:#f2c17c;}
.close-bar{position:sticky;top:0;z-index:30;display:flex;justify-content:flex-end;padding:12px 16px 0;background:linear-gradient(var(--surface) 60%, transparent);}
.modal-info h3{font-size:30px;margin:0 0 6px;}
.modal-info .tagrow{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px;}
.tagpill{background:var(--surface-2);border:1px solid var(--line);color:var(--muted);font-size:11.5px;padding:3px 10px;border-radius:999px;}
.modal-info p.overview{font-size:14px;line-height:1.6;color:#d8dbe0;max-height:110px;overflow:auto;}
.modal-info .cast{font-size:12.5px;color:var(--muted);margin-top:10px;}
.modal-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.seasons{padding:0 24px 24px;}
.seasons h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:6px 0 12px;}
.season-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--bg-soft);border:1px solid var(--line);border-radius:8px;margin-bottom:8px;
}
.season-row .s-name{font-size:14px;font-weight:600;}
.season-check{
  width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px;font-weight:900;
}
.season-check.checked{background:var(--green);border-color:var(--green);color:#0a1a12;}

/* ---------- MOOD MODAL ---------- */
.mood-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding:24px;}
.mood-tile{
  background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:20px 10px;
  display:flex;flex-direction:column;align-items:center;gap:8px;font-weight:700;font-size:13.5px;
  transition:.15s;
}
.mood-tile:hover{border-color:var(--gold);transform:translateY(-3px);background:var(--surface-2);}
.mood-tile .emoji{font-size:28px;}
.mood-result{padding:0 24px 24px;text-align:center;}
.mood-result .pick-card{max-width:260px;margin:14px auto 0;}

/* ---------- LOADING / TOAST ---------- */
.loader{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:20px 0;}
.spin{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--gold);animation:sp 0.8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--gold-dim);color:var(--text);
  padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;
  opacity:0;pointer-events:none;transition:.25s;z-index:400;box-shadow:var(--shadow);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{text-align:center;color:var(--muted);font-size:11.5px;padding:40px 0 20px;letter-spacing:.04em;}

/* ---------- PROFILE SCREEN ---------- */
.profile-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:40px;padding:24px;text-align:center;
}
.profile-screen h1{font-size:44px;color:var(--gold);margin:0;}
.profile-screen p{color:var(--muted);margin:0;font-size:14px;}
.profile-list{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;}
.profile-card{
  background:none;border:none;color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:6px;border-radius:16px;transition:transform .18s;
}
.profile-card:hover{transform:translateY(-4px);}
.profile-avatar{
  width:120px;height:120px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue';font-size:52px;
  border:2px solid transparent;transition:border-color .18s, box-shadow .18s;
}
.profile-card:hover .profile-avatar{border-color:var(--gold);box-shadow:0 0 0 4px rgba(227,168,87,.15);}
.profile-card span.pname{font-size:15px;font-weight:600;color:var(--muted);}
.profile-card:hover span.pname{color:var(--text);}
.profile-switch-btn{
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  width:36px;height:36px;border-radius:50%;font-weight:800;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}

@media(max-width:640px){
  html,body{overflow-x:hidden;}
  .topbar{padding:12px 14px;gap:8px 10px;padding-top:calc(12px + env(safe-area-inset-top));}
  .brand{order:1;font-size:20px;}
  .brand span.txt{display:none;}
  .profile-switch-btn{order:2;margin-left:auto;}
  .nav{order:3;flex:1 1 100%;overflow-x:auto;gap:6px;}
  .nav button{padding:7px 12px;font-size:12.5px;white-space:nowrap;}
  .mood-btn{order:4;flex:1 1 auto;padding:9px 6px;font-size:12px;justify-content:center;gap:5px;}
  .view{padding:16px;}
  .modal-hero{flex-direction:column;}
  .modal-hero img{width:100%;max-width:220px;}
}
@media(max-width:380px){
  .mood-btn span.txt-label{display:none;}
}
</style>
</head>
<body>

<div id="app">
<div class="topbar">
  <div class="brand"><span class="dot"></span><span class="txt">CineMood</span></div>
  <nav class="nav">
    <button data-view="home" class="active">Home</button>
    <button data-view="search">Cerca</button>
    <button data-view="favorites">Preferiti</button>
  </nav>
  <button class="mood-btn alt-purple" id="openRecommended" type="button">✨ <span class="txt-label">Consigliati</span></button>
  <button class="mood-btn alt-teal" id="openUpcoming" type="button">🆕 <span class="txt-label">Uscite</span></button>
  <button class="mood-btn" id="openMood">🎭 <span class="txt-label">Mood</span></button>
  <button class="profile-switch-btn" id="switchProfileBtn" title="Cambia profilo"></button>
</div>

<!-- HOME -->
<section class="view" id="view-home">
  <div id="platformShelves"></div>
</section>

<!-- SEARCH -->
<section class="view" id="view-search" hidden>
  <div class="filters">
    <div class="field" style="grid-column:1/-1;">
      <label>Cerca per titolo</label>
      <input id="f-query" placeholder="es. Dune, Breaking Bad…">
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="f-type">
        <option value="both">Film + Serie TV</option>
        <option value="movie">Solo film</option>
        <option value="tv">Solo serie TV</option>
      </select>
    </div>
    <div class="field">
      <label>Attore / Attrice</label>
      <input id="f-actor" placeholder="es. Zendaya">
    </div>
    <div class="field">
      <label>Genere</label>
      <select id="f-genre"><option value="">Tutti i generi</option></select>
    </div>
    <div class="field">
      <label>Anno</label>
      <input id="f-year" type="number" placeholder="es. 2024" min="1900" max="2030">
    </div>
    <div class="field range">
      <label>Voto minimo <span class="val" id="f-rating-val">0</span></label>
      <input id="f-rating" type="range" min="0" max="9" step="0.5" value="0">
    </div>
    <div class="field">
      <label>Ordina per</label>
      <select id="f-sort">
        <option value="popularity.desc">Popolarità</option>
        <option value="vote_average.desc">Voto più alto</option>
        <option value="primary_release_date.desc">Più recenti</option>
      </select>
    </div>
    <div class="search-actions">
      <button class="btn" id="clearFilters">Pulisci</button>
      <button class="btn primary" id="runSearch">Cerca</button>
    </div>
  </div>
  <div id="searchResults"></div>
</section>

<!-- FAVORITES -->
<section class="view" id="view-favorites" hidden>
  <div class="subtabs">
    <button data-fav="movie" class="active">Film</button>
    <button data-fav="tv">Serie TV</button>
  </div>
  <div id="favGrid" class="results-grid"></div>
</section>

<footer>CineMood · dati forniti da TMDB · uso personale</footer>

</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal"></div>
</div>

<!-- MOOD MODAL -->
<div class="overlay" id="moodOverlay">
  <div class="modal" id="moodModal">
    <div class="modal-sticky-header">
      <div>
        <h3>Che mood hai stasera?</h3>
        <p>Scegli un mood, affina con anno/piattaforma se vuoi, poi cerca in tutto il catalogo.</p>
      </div>
      <button class="modal-close" id="moodClose" type="button">✕</button>
    </div>
    <div class="mood-body">
      <div class="mood-grid" id="moodGrid"></div>
      <div class="mood-filters">
        <div class="field">
          <label>Anno</label>
          <input id="mood-year" type="number" placeholder="es. 2020" min="1900" max="2030">
        </div>
        <div class="field">
          <label>Piattaforma</label>
          <select id="mood-platform"><option value="">Tutte</option></select>
        </div>
        <div class="field">
          <label>Ordina per</label>
          <select id="mood-sort">
            <option value="popularity.desc">Rilevanza</option>
            <option value="vote_average.desc">Voto più alto</option>
            <option value="year.desc">Anno (più recenti)</option>
            <option value="year.asc">Anno (più vecchi)</option>
          </select>
        </div>
      </div>
      <div class="mood-actions">
        <button class="btn" id="moodHomeBtn" type="button">🏠 Torna alla Home</button>
        <button class="btn primary" id="moodSearchBtn" type="button">Cerca</button>
      </div>
      <div id="moodResults"></div>
    </div>
  </div>
</div>

<!-- RECOMMENDED MODAL -->
<div class="overlay" id="recOverlay">
  <div class="modal" id="recModal">
    <div class="modal-sticky-header">
      <div>
        <h3>Consigliati per te</h3>
        <p>Basato sui titoli che hai segnato come visti.</p>
      </div>
      <button class="modal-close" id="recClose" type="button">✕</button>
    </div>
    <div class="mood-body">
      <div id="recResults"></div>
    </div>
  </div>
</div>

<!-- UPCOMING MODAL -->
<div class="overlay" id="upcomingOverlay">
  <div class="modal" id="upcomingModal">
    <div class="modal-sticky-header">
      <div>
        <h3>Nuove uscite</h3>
        <p id="upcomingSubtitle">Al cinema e in streaming questo mese.</p>
      </div>
      <button class="modal-close" id="upcomingClose" type="button">✕</button>
    </div>
    <div class="mood-body">
      <div id="upcomingResults"></div>
    </div>
  </div>

async function tmdb(path, params={}){
  const url = new URL(BASE+path);
  url.searchParams.set("api_key", TMDB_KEY);
  url.searchParams.set("language", LANG);
  Object.entries(params).forEach(([k,v])=>{ if(v!==undefined && v!==null && v!=="") url.searchParams.set(k,v); });
  const res = await fetch(url);
  if(!res.ok) throw new Error("TMDB error "+res.status);
  return res.json();
}

function posterUrl(p){ return p ? IMG+p : null; }

async function runSearch(){
  const query = document.getElementById("f-query").value.trim();
  const type = document.getElementById("f-type").value;
  const actor = document.getElementById("f-actor").value.trim();
  const genre = document.getElementById("f-genre").value;
  const year = document.getElementById("f-year").value;
  const rating = document.getElementById("f-rating").value;
  const sort = document.getElementById("f-sort").value;
  const resultsEl = document.getElementById("searchResults");
  resultsEl.innerHTML = `<div class="loader"><div class="spin"></div>Ricerca in corso…</div>`;

  const isAnime = genre === "anime";

  try{
    let combined = [];

    if(query){
      /* ---- ricerca testuale per titolo ---- */
      let movies=[], tv=[];
      if(type!=="tv") movies = (await tmdb("/search/movie", { query, year: year||undefined })).results || [];
      if(type!=="movie") tv = (await tmdb("/search/tv", { query, first_air_date_year: year||undefined })).results || [];

      combined = [
        ...movies.map(x=>({...x, media_type:"movie"})),
        ...tv.map(x=>({...x, media_type:"tv"})),
      ];

      /* filtri applicati lato client, dato che l'endpoint di ricerca testuale non li supporta nativamente */
      if(genre){
        combined = combined.filter(x=>{
          if(isAnime) return (x.genre_ids||[]).includes(16) && x.original_language==="ja";
          return (x.genre_ids||[]).includes(Number(genre));
        });
      }
      if(rating && Number(rating)>0){
        combined = combined.filter(x => (x.vote_average||0) >= Number(rating));
      }
      if(actor){
        const people = await tmdb("/search/person", { query: actor });
        const castId = people.results && people.results.length ? people.results[0].id : null;
        if(castId){
          const checks = await Promise.all(combined.map(async x=>{
            try{
              const cr = await tmdb(`/${x.media_type}/${x.id}/credits`);
              return (cr.cast||[]).some(c=>c.id===castId) ? x : null;
            }catch(e){ return null; }
          }));
          combined = checks.filter(Boolean);
        } else {
          combined = [];
        }
      }
      if(sort==="vote_average.desc") combined.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
      else if(sort==="primary_release_date.desc") combined.sort((a,b)=>((b.release_date||b.first_air_date||"")).localeCompare(a.release_date||a.first_air_date||""));

    } else {
      /* ---- ricerca a filtri (discover) ---- */
      let castId = null;
      if(actor){
        const people = await tmdb("/search/person", { query: actor });
        if(people.results && people.results.length) castId = people.results[0].id;
      }
      const params = (mediaType)=>{
        const p = { sort_by: sort, "vote_count.gte": 20 };
        if(castId) p.with_cast = castId;
        if(genre && !isAnime) p.with_genres = genre;
        if(isAnime){ p.with_genres = 16; p.with_original_language = "ja"; }
        if(rating && Number(rating)>0) p["vote_average.gte"] = rating;
        if(year){
          if(mediaType==="movie") p.primary_release_year = year;
          else p.first_air_date_year = year;
        }
        return p;
      };
      let movies=[], tv=[];
      if(type!=="tv") movies = (await tmdb("/discover/movie", params("movie"))).results || [];
      if(type!=="movie") tv = (await tmdb("/discover/tv", params("tv"))).results || [];
      combined = [
        ...movies.map(x=>({...x, media_type:"movie"})),
        ...tv.map(x=>({...x, media_type:"tv"})),
      ];
    }

    resultsEl.innerHTML = "";
    if(!combined.length){
      resultsEl.innerHTML = `<div class="empty"><b>Nessun risultato.</b><br>Prova ad allargare i filtri o a controllare il titolo digitato.</div>`;
      return;
    }
    const grid = document.createElement("div");
    grid.className = "results-grid";
    combined.forEach(item=> grid.appendChild(buildCard(item, item.media_type)));
    resultsEl.appendChild(grid);
  }catch(e){
    resultsEl.innerHTML = `<div class="empty">Errore durante la ricerca. Riprova.</div>`;
  }
}

            ${embyItem ? `<a class="btn primary" id="detailEmbyPlay" href="${embyPlayUrl(embyItem.Id)}" target="_blank" rel="noopener">▶ Guarda su Emby</a>` : (embyEnabled() ? `<span class="btn" style="opacity:.5;cursor:default;">Non su Emby</span>` : "")}
          </div>
        </div>
      </div>
      ${seasonsHtml}
    `;

    document.getElementById("detailClose").addEventListener("click", closeDetail);
    detailModal.querySelectorAll(".person-link").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const pid = btn.dataset.pid, pname = btn.dataset.pname, asCrew = btn.dataset.role==="crew";
        closeDetail();
        openPersonWorks(pid, pname, asCrew);
      });
    });
    document.getElementById("detailFav").addEventListener("click", ()=>{
      toggleFavorite({
        id, title, poster_path:details.poster_path, vote_average:details.vote_average,
        genre_ids:(details.genres||[]).map(g=>g.id), media_type:mediaType
      }, mediaType);
      openDetail(id, mediaType);
    });
    document.getElementById("detailWatched").addEventListener("click", ()=>{
      toggleWatched(mediaType, id);
      if(embyItem) embyMarkWatched(embyItem.Id, isWatched(mediaType, id));
      openDetail(id, mediaType);
    });
    detailModal.querySelectorAll(".season-row").forEach(row=>{
      row.addEventListener("click", ()=>{
        const sNum = Number(row.dataset.season);
        WATCHED_SEASONS[id] = WATCHED_SEASONS[id] || [];
        const idx = WATCHED_SEASONS[id].indexOf(sNum);
        if(idx>=0) WATCHED_SEASONS[id].splice(idx,1);
        else WATCHED_SEASONS[id].push(sNum);
        persistAll();
        const chk = row.querySelector(".season-check");
        const nowFlagged = WATCHED_SEASONS[id].includes(sNum);
        chk.classList.toggle("checked", nowFlagged);
        chk.textContent = nowFlagged ? "✓" : "";
      });
    });
  }catch(e){
    detailModal.innerHTML = `<div style="padding:30px"><button class="modal-close" id="detailClose">✕</button><div class="empty">Impossibile caricare i dettagli.</div></div>`;
    document.getElementById("detailClose").addEventListener("click", closeDetail);
  }
}

async function runMoodSearch(){
  const resultsEl = document.getElementById("moodResults");
  if(!selectedMoodKey){
    resultsEl.innerHTML = `<div class="empty">Scegli prima un mood qui sopra.</div>`;
    return;
  }
  const mood = MOODS.find(m=>m.key===selectedMoodKey);
  const year = document.getElementById("mood-year").value;
  const platform = document.getElementById("mood-platform").value;
  const sort = document.getElementById("mood-sort").value;
  resultsEl.innerHTML = `<div class="loader"><div class="spin"></div>Ricerca in corso…</div>`;

  const baseParams = (mediaType)=>{
    const p = { with_genres: mood.genre, sort_by:"popularity.desc", "vote_count.gte": 15 };
    if(platform){ p.with_watch_providers = platform; p.watch_region = REGION; }
    if(year){ if(mediaType==="movie") p.primary_release_year = year; else p.first_air_date_year = year; }
    return p;
  };

  try{
    const pages = [1,2,3];
    const [movieResults, tvResults] = await Promise.all([
      Promise.all(pages.map(pg => tmdb("/discover/movie", {...baseParams("movie"), page:pg}))),
      Promise.all(pages.map(pg => tmdb("/discover/tv", {...baseParams("tv"), page:pg}))),
    ]);
    let combined = [
      ...movieResults.flatMap(r=>r.results||[]).map(x=>({...x, media_type:"movie"})),
      ...tvResults.flatMap(r=>r.results||[]).map(x=>({...x, media_type:"tv"})),
    ];
    const seen = new Set();
    combined = combined.filter(x=>{
      const k = x.media_type+"-"+x.id;
      if(seen.has(k)) return false;
      seen.add(k); return true;
    });

    if(sort==="vote_average.desc") combined.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
    else if(sort==="year.desc") combined.sort((a,b)=>((b.release_date||b.first_air_date||"")).localeCompare(a.release_date||a.first_air_date||""));
    else if(sort==="year.asc") combined.sort((a,b)=>((a.release_date||a.first_air_date||"")).localeCompare(b.release_date||b.first_air_date||""));

    resultsEl.innerHTML = "";
    if(!combined.length){
      resultsEl.innerHTML = `<div class="empty">Nessun risultato con questi filtri: prova ad allargarli.</div>`;
      return;
    }
    const grid = document.createElement("div");
    grid.className = "results-grid";
    combined.forEach(item=> grid.appendChild(buildCard(item, item.media_type)));
    resultsEl.appendChild(grid);
  }catch(e){
    resultsEl.innerHTML = `<div class="empty">Errore durante la ricerca. Riprova.</div>`;
  }
}

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

async function buildRecommendations(){
  const el = document.getElementById("recResults");
  const movieIds = Object.keys(WATCHED.movie);
  const tvIds = Object.keys(WATCHED.tv);
  let seeds = [...movieIds.map(id=>({id,type:"movie"})), ...tvIds.map(id=>({id,type:"tv"}))];

  if(!seeds.length){
    el.innerHTML = `<div class="empty">Segna qualche film o serie come <b>"visto"</b> per ricevere consigli su misura.</div>`;
    return;
  }

  seeds = shuffleArray(seeds).slice(0,15);
  el.innerHTML = `<div class="loader"><div class="spin"></div>Sto pensando a cosa potrebbe piacerti…</div>`;

  try{
    const recLists = await Promise.all(seeds.map(async s=>{
      try{
        const r = await tmdb(`/${s.type}/${s.id}/recommendations`);
        return (r.results||[]).map(x=>({...x, media_type:s.type}));
      }catch(e){ return []; }
    }));

    const already = new Set([...movieIds.map(id=>"movie-"+id), ...tvIds.map(id=>"tv-"+id)]);
    const scoreMap = new Map();
    recLists.flat().forEach(item=>{
      if(!item.poster_path) return;
      const key = item.media_type+"-"+item.id;
      if(already.has(key)) return;
      if(!scoreMap.has(key)) scoreMap.set(key, {item, score:0});
      scoreMap.get(key).score += 1 + (item.vote_average||0)/10;
    });

    const list = [...scoreMap.values()].sort((a,b)=>b.score-a.score).slice(0,50).map(x=>x.item);

    el.innerHTML = "";
    if(!list.length){
      el.innerHTML = `<div class="empty">Non ho trovato abbastanza titoli simili: continua a segnare cosa hai visto.</div>`;
      return;
    }
    const grid = document.createElement("div");
    grid.className = "results-grid";
    list.forEach(item=> grid.appendChild(buildCard(item, item.media_type)));
    el.appendChild(grid);
  }catch(e){
    el.innerHTML = `<div class="empty">Errore nel calcolo dei consigli. Riprova.</div>`;
  }
}

/* ================= NUOVE USCITE ================= */
const upcomingOverlay = document.getElementById("upcomingOverlay");
const ITA_MONTHS = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
const ITA_MONTHS_SHORT = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];

document.getElementById("openUpcoming").addEventListener("click", ()=>{
  document.getElementById("upcomingSubtitle").textContent = `Al cinema e in streaming a ${ITA_MONTHS[new Date().getMonth()]}.`;
  upcomingOverlay.classList.add("open");
  buildUpcoming();
});

function formatShortDate(dateStr){
  if(!dateStr) return "";
  const d = new Date(dateStr+"T00:00:00");
  return `${d.getDate()} ${ITA_MONTHS_SHORT[d.getMonth()]}`;
}

async function buildUpcoming(){
  const container = document.getElementById("upcomingResults");
  container.innerHTML = `<div class="loader"><div class="spin"></div>Carico le prossime uscite…</div>`;

  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const pad = n => String(n).padStart(2,"0");
  const startDate = `${y}-${pad(m+1)}-01`;
  const lastDay = new Date(y, m+1, 0).getDate();
  const endDate = `${y}-${pad(m+1)}-${pad(lastDay)}`;
  const providerIds = PLATFORMS.map(p=>p.id).join("|");

  try{
    const [cinemaRes, streamRes, tvRes] = await Promise.all([
      tmdb("/discover/movie", { "primary_release_date.gte":startDate, "primary_release_date.lte":endDate, region:REGION, with_release_type:"2|3", sort_by:"popularity.desc" }),
      tmdb("/discover/movie", { "primary_release_date.gte":startDate, "primary_release_date.lte":endDate, watch_region:REGION, with_watch_providers:providerIds, with_release_type:"4|6", sort_by:"popularity.desc" }),
      tmdb("/discover/tv", { "first_air_date.gte":startDate, "first_air_date.lte":endDate, watch_region:REGION, with_watch_providers:providerIds, sort_by:"popularity.desc" }),
    ]);

    let items = [
      ...(cinemaRes.results||[]).map(x=>({...x, media_type:"movie", _tag:"Cinema", _date:x.release_date})),
      ...(streamRes.results||[]).map(x=>({...x, media_type:"movie", _tag:"Streaming", _date:x.release_date})),
      ...(tvRes.results||[]).map(x=>({...x, media_type:"tv", _tag:"Streaming", _date:x.first_air_date})),
    ];
    const seen = new Set();
    items = items.filter(x=>{
      const k = x.media_type+"-"+x.id;
      if(seen.has(k) || !x.poster_path) return false;
      seen.add(k); return true;
    });
    items.sort((a,b)=> (a._date||"").localeCompare(b._date||""));

    container.innerHTML = "";
    if(!items.length){
      container.innerHTML = `<div class="empty">Nessuna uscita trovata per questo mese.</div>`;
      return;
    }
    const grid = document.createElement("div");
    grid.className = "results-grid";
    items.forEach(item=>{
      grid.appendChild(buildCard(item, item.media_type, { badge: `${formatShortDate(item._date)} · ${item._tag}` }));
    });
    container.appendChild(grid);
  }catch(e){
    container.innerHTML = `<div class="empty">Errore nel caricamento delle uscite.</div>`;
  }
}

/* ================= PERSON SEARCH ================= */
function switchToSearchTab(){
  document.querySelectorAll(".nav [data-view]").forEach(b=>b.classList.remove("active"));
  document.querySelector('.nav [data-view="search"]').classList.add("active");
  document.querySelectorAll(".view").forEach(v=>v.hidden = true);
  document.getElementById("view-search").hidden = false;
}

let personWorksCache = [];
let personWorksLabel = "";

function renderPersonWorks(){
  const resultsEl = document.getElementById("searchResults");
  const typeFilter = document.getElementById("pw-type")?.value || "all";
  const hideExtras = document.getElementById("pw-hide-extras")?.checked ?? true;

  let list = personWorksCache;
  if(typeFilter!=="all") list = list.filter(x=>x.media_type===typeFilter);
  if(hideExtras){
    list = list.filter(x=>{
      const ch = (x.character||"").trim().toLowerCase();
      if(!ch) return true; // ruoli di doppiaggio/crew senza personaggio indicato restano (es. animazione)
      return !/^(self|narrator|host|himself|herself|themselves|guest)/.test(ch);
    });
  }

  const bar = `
    <div class="filters" style="margin-bottom:16px;padding:14px;">
      <div class="field">
        <label>Tipo</label>
        <select id="pw-type">
          <option value="all">Film + Serie TV</option>
          <option value="movie">Solo film</option>
          <option value="tv">Solo serie TV</option>
        </select>
      </div>
      <div class="field" style="display:flex;flex-direction:column;justify-content:flex-end;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;text-transform:none;letter-spacing:0;color:var(--text);font-weight:600;">
          <input type="checkbox" id="pw-hide-extras" style="width:16px;height:16px;">
          Nascondi apparizioni non recitate (talk show, doc, ospitate)
        </label>
      </div>
    </div>
  `;

  resultsEl.innerHTML = `
    <p style="color:var(--muted);font-size:13px;margin:0 0 14px;">${personWorksLabel}</p>
    ${bar}
  `;
  document.getElementById("pw-type").value = typeFilter;
  document.getElementById("pw-hide-extras").checked = hideExtras;
  document.getElementById("pw-type").addEventListener("change", renderPersonWorks);
  document.getElementById("pw-hide-extras").addEventListener("change", renderPersonWorks);

  if(!list.length){
    resultsEl.innerHTML += `<div class="empty">Nessun titolo trovato con questi filtri.</div>`;
    return;
  }
  const grid = document.createElement("div");
  grid.className = "results-grid";
  list.forEach(item=> grid.appendChild(buildCard(item, item.media_type)));
  resultsEl.appendChild(grid);
}

async function openPersonWorks(personId, personName, asCrew){
  switchToSearchTab();
  const resultsEl = document.getElementById("searchResults");
  resultsEl.innerHTML = `<div class="loader"><div class="spin"></div>Ricerca in corso…</div>`;
  try{
    const credits = await tmdb(`/person/${personId}/combined_credits`);
    let list = asCrew ? (credits.crew||[]).filter(c=>c.department==="Directing") : (credits.cast||[]);
    const seen = new Set();
    list = list.filter(x=>{
      const k = x.media_type+"-"+x.id;
      if(seen.has(k) || !x.poster_path) return false;
      seen.add(k); return true;
    });
    list.sort((a,b)=>(b.popularity||0)-(a.popularity||0));

    personWorksCache = list;
    personWorksLabel = `${asCrew?'Regia di':'Con'} ${personName}`;
    renderPersonWorks();
  }catch(e){
    resultsEl.innerHTML = `<div class="empty">Errore nel caricamento dei titoli.</div>`;
  }
}

async function bootProfile(name){

  swBtn.textContent = name[0];

  await loadState();
  renderFavorites();
  refreshAllCardStates();
  buildHome();
  await loadGenres();
}
