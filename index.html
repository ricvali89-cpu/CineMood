<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CineMood — Il tuo cinema, il tuo umore</title>
  <meta name="theme-color" content="#090b0f" />
  <meta name="description" content="Cerca film e serie TV, salva i preferiti e trova cosa guardare in base al mood." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CineMood" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #090b0f;
      --bg-soft: #12161f;
      --surface: #181e28;
      --surface-2: #212936;
      --line: #2a3445;
      --gold: #e3a857;
      --gold-hover: #f0b868;
      --text: #f2efe9;
      --muted: #8a93a3;
      --red: #c14b4b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

    /* --- SPLASH SCREEN --- */
    #splash-screen {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: #000;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #splash-screen video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* --- HEADER & NAV --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(9, 11, 15, 0.9);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
    .nav-links { display: flex; gap: 15px; align-items: center; }
    .nav-btn {
      background: none; border: none; color: var(--muted);
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: color 0.3s;
      display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 8px;
    }
    .nav-btn:hover, .nav-btn.active { color: var(--text); background: var(--surface); }

    .lang-selector { display: flex; gap: 8px; margin-left: 10px; }
    .lang-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; opacity: 0.5; transition: 0.3s; }
    .lang-btn.active, .lang-btn:hover { opacity: 1; transform: scale(1.1); }

    .profile-switch-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--gold); background: var(--surface);
      color: var(--gold); font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s; margin-left: 10px;
    }
    .profile-switch-btn:hover { transform: scale(1.08); }

    /* --- HERO BANNER (3/4 SCREEN) --- */
    .hero-container {
      position: relative;
      height: 70vh;
      width: 100%;
      overflow: hidden;
      background: var(--bg-soft);
    }
    .hero-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      padding: 50px 40px;
    }
    .hero-slide.active { opacity: 1; }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(9,11,15,0) 20%, rgba(9,11,15,0.95) 100%);
    }
    .hero-content {
      position: relative; z-index: 2; max-width: 650px;
    }
    .platform-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem; font-weight: 800;
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;
      background: var(--gold); color: #000;
    }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; margin-bottom: 10px; line-height: 1; letter-spacing: 1px; }
    .hero-desc { color: var(--muted); font-size: 1rem; margin-bottom: 20px; line-clamp: 3; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }

    /* --- SEZIONI GENERALI --- */
    section { padding: 35px 30px; }
    .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; border-left: 4px solid var(--gold); padding-left: 12px; }

    /* --- TRAILERS CAROUSEL --- */
    .carousel-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; scroll-behavior: smooth; }
    .carousel-container::-webkit-scrollbar { height: 6px; }
    .carousel-container::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }

    .trailer-card {
      min-width: 300px; width: 300px; background: var(--surface);
      border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.3s, border-color 0.3s;
      border: 1px solid var(--line);
    }
    .trailer-card:hover { transform: translateY(-6px); border-color: var(--gold); }
    .trailer-thumb { position: relative; height: 170px; background-size: cover; background-position: center; }
    .play-icon {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45); font-size: 2.5rem; color: var(--gold); opacity: 0.85; transition: 0.3s;
    }
    .trailer-card:hover .play-icon { opacity: 1; transform: scale(1.15); }
    .trailer-info { padding: 14px; }
    .trailer-title { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* --- GUIDA TV VIEW --- */
    .view-container { display: none; }
    .view-container.active { display: block; }

    .tv-tabs { display: flex; gap: 15px; margin-bottom: 25px; }
    .tab-btn {
      padding: 10px 24px; border: 2px solid var(--gold); background: none;
      color: var(--text); font-weight: 700; border-radius: 25px; cursor: pointer; transition: 0.3s;
    }
    .tab-btn.active, .tab-btn:hover { background: var(--gold); color: #000; }

    .channel-row { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 20px; padding: 18px; }
    .channel-header { font-size: 1.15rem; font-weight: 700; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .epg-timeline { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
    .epg-item {
      min-width: 200px; background: var(--surface-2); padding: 12px; border-radius: 8px; font-size: 0.88rem;
      border-left: 4px solid var(--line); transition: background 0.2s;
    }
    .epg-item.is-movie { border-left-color: var(--gold); cursor: pointer; background: #1f2733; }
    .epg-item.is-movie:hover { background: #283344; }
    .epg-time { color: var(--muted); font-size: 0.78rem; font-weight: 600; margin-bottom: 5px; }
    .epg-title { font-weight: 700; color: var(--text); }
    .movie-badge { display: inline-block; font-size: 0.68rem; font-weight: 800; background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; margin-top: 6px; }

    /* MODALE VIDEO / DETTAGLI */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000;
      display: none; align-items: center; justify-content: center; padding: 20px;
      backdrop-filter: blur(5px);
    }
    .modal.active { display: flex; }
    .modal-content { background: var(--surface); border: 1px solid var(--line); width: 100%; max-width: 720px; border-radius: 16px; overflow: hidden; position: relative; }
    .close-modal { position: absolute; top: 12px; right: 18px; font-size: 2rem; color: var(--muted); cursor: pointer; z-index: 10; transition: color 0.2s; }
    .close-modal:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- 1. SPLASH SCREEN ANIMATO -->
  <div id="splash-screen">
    <video id="splash-video" autoplay muted playsinline>
      <source src="logo-animation.mp4" type="video/mp4">
    </video>
  </div>

  <!-- HEADER -->
  <header>
    <div class="logo">🎬 CineMood</div>
    <nav class="nav-links">
      <button class="nav-btn active" onclick="switchView('home')">Home</button>
      <button class="nav-btn" onclick="switchView('tvguide')">📺 Guida TV</button>
      <button class="nav-btn" onclick="switchView('favorites')">❤️ Preferiti</button>
      <div class="lang-selector">
        <button class="lang-btn active" title="Italiano">🇮🇹</button>
        <button class="lang-btn" title="English">🇬🇧</button>
      </div>
      <button class="profile-switch-btn" id="switchProfileBtn" title="Cambia Profilo">R</button>
    </nav>
  </header>

  <!-- 2. VISTA HOME -->
  <main id="view-home" class="view-container active">
    <!-- HERO BANNER SCORREVOLE -->
    <div class="hero-container" id="hero-slider">
      <!-- Slides generate via JavaScript -->
    </div>

    <!-- TRAILER DELLA SETTIMANA -->
    <section>
      <h2 class="section-title">🔥 Trailer della Settimana</h2>
      <div class="carousel-container" id="trailers-container">
        <!-- Card trailer generate via JS -->
      </div>
    </section>
  </main>

  <!-- 3. VISTA GUIDA TV -->
  <main id="view-tvguide" class="view-container">
    <section>
      <h2 class="section-title">📺 Guida TV Programmazione</h2>
      <div class="tv-tabs">
        <button class="tab-btn active" onclick="loadEPG('ita', event)">TV Italiana</button>
        <button class="tab-btn" onclick="loadEPG('sky', event)">Sky</button>
      </div>

      <div id="epg-channels-container">
        <!-- Programmazione canali caricata via JS -->
      </div>
    </section>
  </main>

  <!-- VISTA PREFERITI (Placeholder) -->
  <main id="view-favorites" class="view-container">
    <section>
      <h2 class="section-title">❤️ I tuoi Preferiti</h2>
      <p style="color: var(--muted);">Nessun titolo salvato nei preferiti per ora.</p>
    </section>
  </main>

  <!-- MODALE VIDEO / DETTAGLI -->
  <div id="info-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div id="modal-body" style="padding: 24px;"></div>
    </div>
  </div>

  <script>
    // --- GESTIONE SPLASH SCREEN ---
    const splash = document.getElementById('splash-screen');
    const splashVideo = document.getElementById('splash-video');
    
    if (splashVideo) {
      splashVideo.onended = () => hideSplash();
      setTimeout(() => hideSplash(), 4000); // Fallback 4 sec
    } else {
      hideSplash();
    }

    function hideSplash() {
      if (splash) splash.classList.add('hidden');
    }

    // --- CAMBIO VISTE (Home / Guida TV / Preferiti) ---
    function switchView(viewName) {
      document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      
      if(viewName === 'home') {
        document.getElementById('view-home').classList.add('active');
        event.currentTarget.classList.add('active');
      } else if(viewName === 'tvguide') {
        document.getElementById('view-tvguide').classList.add('active');
        event.currentTarget.classList.add('active');
        loadEPG('ita');
      } else if(viewName === 'favorites') {
        document.getElementById('view-favorites').classList.add('active');
        event.currentTarget.classList.add('active');
      }
    }

    // --- HERO BANNER DATA & AUTOMATION ---
    const heroItems = [
      { platform: 'Netflix', title: 'Stranger Things', desc: 'I ragazzi di Hawkins affrontano il Sottosopra per l'ultima memorabile battaglia.', img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200' },
      { platform: 'Prime Video', title: 'Il Signore degli Anelli', desc: 'Le leggende della Seconda Era della Terra di Mezzo prendono vita su grande scala.', img: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1200' },
      { platform: 'HBO Max', title: 'House of the Dragon', desc: 'La sanguinosa e spietata lotta di potere all'interno della casata Targaryen per il Trono di Spade.', img: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=1200' },
      { platform: 'Disney+', title: 'The Mandalorian', desc: 'I viaggi e le avventure di un cacciatore di taglie solitario ai confini della galassia.', img: 'https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=1200' }
    ];

    const heroSlider = document.getElementById('hero-slider');
    heroItems.forEach((item, index) => {
      const slide = document.createElement('div');
      slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
      slide.style.backgroundImage = `url('${item.img}')`;
      slide.innerHTML = `
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <span class="platform-badge">${item.platform}</span>
          <h1 class="hero-title">${item.title}</h1>
          <p class="hero-desc">${item.desc}</p>
        </div>
      `;
      heroSlider.appendChild(slide);
    });

    let currentSlide = 0;
    setInterval(() => {
      const slides = document.querySelectorAll('.hero-slide');
      if (slides.length > 0) {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
      }
    }, 3000); // Cambio ogni 3 secondi

    // --- TRAILER DELLA SETTIMANA DATA ---
    const trailers = [
      { title: 'Dune - Parte Due', thumb: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=400', embed: 'https://www.youtube.com/embed/Way9Dexny3w' },
      { title: 'Gladiatore II', thumb: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=400', embed: 'https://www.youtube.com/embed/Way9Dexny3w' },
      { title: 'Joker 2: Folie à Deux', thumb: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400', embed: 'https://www.youtube.com/embed/Way9Dexny3w' }
    ];

    const trailersContainer = document.getElementById('trailers-container');
    trailers.forEach(t => {
      const card = document.createElement('div');
      card.className = 'trailer-card';
      card.onclick = () => openTrailerModal(t.embed);
      card.innerHTML = `
        <div class="trailer-thumb" style="background-image: url('${t.thumb}')">
          <div class="play-icon">▶</div>
        </div>
        <div class="trailer-info">
          <div class="trailer-title">${t.title}</div>
        </div>
      `;
      trailersContainer.appendChild(card);
    });

    // --- GUIDA TV DATA ---
    const epgData = {
      ita: [
        { channel: 'Rai 1', schedule: [ { time: '20:30', title: 'TG1', isMovie: false }, { time: '21:25', title: 'Top Gun: Maverick', isMovie: true, plot: 'Il capitano Pete Mitchell si trova ad addestrare una squadra speciale di allievi della scuola Top Gun per una missione impossibile.' } ] },
        { channel: 'Canale 5', schedule: [ { time: '20:40', title: 'Striscia la Notizia', isMovie: false }, { time: '21:30', title: 'Oppenheimer', isMovie: true, plot: 'La storia del fisico teorico J. Robert Oppenheimer e il suo ruolo nello sviluppo della bomba atomica durante il Progetto Manhattan.' } ] }
      ],
      sky: [
        { channel: 'Sky Cinema Uno', schedule: [ { time: '21:15', title: 'Spider-Man: Across the Spider-Verse', isMovie: true, plot: 'Miles Morales viene catapultato attraverso il Multiverso, dove incontra una squadra di Spider-Heroes incaricata di proteggerne l'esistenza stessa.' } ] },
        { channel: 'Sky Arte', schedule: [ { time: '21:15', title: 'Documentario Musica & AI', isMovie: false } ] }
      ]
    };

    function loadEPG(type, evt) {
      if (evt) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        evt.currentTarget.classList.add('active');
      }

      const container = document.getElementById('epg-channels-container');
      container.innerHTML = '';

      epgData[type].forEach(ch => {
        const row = document.createElement('div');
        row.className = 'channel-row';
        
        let scheduleHtml = '';
        ch.schedule.forEach(prog => {
          scheduleHtml += `
            <div class="epg-item ${prog.isMovie ? 'is-movie' : ''}" ${prog.isMovie ? `onclick="openMovieModal('${prog.title.replace(/'/g, "\'")}', '${prog.plot.replace(/'/g, "\'")}')"` : ''}>
              <div class="epg-time">${prog.time}</div>
              <div class="epg-title">${prog.title}</div>
              ${prog.isMovie ? '<span class="movie-badge">🎬 Film</span>' : ''}
            </div>
          `;
        });

        row.innerHTML = `
          <div class="channel-header">📺 ${ch.channel}</div>
          <div class="epg-timeline">${scheduleHtml}</div>
        `;
        container.appendChild(row);
      });
    }

    // --- MODALE HANDLERS ---
    function openTrailerModal(videoUrl) {
      const modal = document.getElementById('info-modal');
      const body = document.getElementById('modal-body');
      body.innerHTML = `<iframe width="100%" height="360" src="${videoUrl}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:8px;"></iframe>`;
      modal.classList.add('active');
    }

    function openMovieModal(title, plot) {
      const modal = document.getElementById('info-modal');
      const body = document.getElementById('modal-body');
      body.innerHTML = `
        <h2 style="color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; margin-bottom: 12px; letter-spacing: 1px;">${title}</h2>
        <p style="color: var(--muted); line-height: 1.6; font-size: 0.98rem; margin-bottom: 20px;">${plot}</p>
        <button style="padding: 10px 20px; background: var(--gold); color: #000; border: none; font-weight: 700; border-radius: 8px; cursor: pointer; transition: background 0.2s;" onclick="closeModal()">Chiudi</button>
      `;
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('info-modal').classList.remove('active');
      document.getElementById('modal-body').innerHTML = '';
    }

    document.getElementById('switchProfileBtn').addEventListener('click', () => {
      window.location.href = 'profiles.html';
    });
  </script>
</body>
</html>
