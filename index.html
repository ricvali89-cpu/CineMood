<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CineMood — Il tuo cinema, il tuo umore</title>
<meta name="theme-color" content="#060913">
<meta name="description" content="Cerca film e serie TV, salva i preferiti e trova cosa guardare in base al mood.">
<!-- iOS: aggiunta a Home come app a schermo intero -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CineMood">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Android/Chrome: PWA installabile -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #060913;
  --bg-soft: #0d1326;
  --surface: #151c33;
  --surface-2: #212b4a;
  --line: #2e3b5e;
  --accent: #8b5cf6; /* Vibrant violet */
  --accent-glow: #a78bfa;
  --gold: #f59e0b; /* Amber */
  --gold-dim: #b45309;
  --red: #ef4444;
  --text: #f8fafc;
  --muted: #94a3b8;
  --green: #10b981;
  --radius: 14px;
  --shadow: 0 10px 30px -10px rgba(0,0,0,0.8);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;}
body{
  background: radial-gradient(800px 600px at top left, #1c143b 0%, var(--bg) 100%), var(--bg);
  background-attachment: fixed;
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{
  font-family:'Bebas Neue', 'Inter', sans-serif;
  letter-spacing:.04em;
  font-weight:400;
}
::selection{background:var(--accent);color:#fff;}
a{color:inherit; text-decoration: none;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- TOP BAR ---------- */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:24px;
  flex-wrap:wrap;
  padding:16px 28px;
  padding-top:calc(16px + env(safe-area-inset-top));
  padding-left:calc(28px + env(safe-area-inset-left));
  padding-right:calc(28px + env(safe-area-inset-right));
  background:rgba(6, 9, 19, 0.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-size:28px;
  color:var(--text);
  white-space:nowrap;
  text-transform: uppercase;
}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}
.nav{display:flex;gap:4px;flex:1;}
.nav button{
  background:none;border:none;color:var(--muted);
  padding:9px 16px;border-radius:999px;font-size:14.5px;font-weight:600;
  transition: all .2s ease;
}
.nav button:hover{color:var(--text); background: rgba(255,255,255,0.05);}
.nav button.active{background:var(--accent);color:#fff; box-shadow: 0 4px 15px -3px rgba(139, 92, 246, 0.4);}
.mood-btn{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--accent),#6d28d9);
  color:#fff;font-weight:700;border:none;
  padding:10px 18px;border-radius:999px;font-size:14px;
  box-shadow:0 8px 24px -8px rgba(139, 92, 246, 0.6);
  transition:transform .15s ease, box-shadow .15s ease;
  white-space:nowrap;
}
.mood-btn:hover{transform:translateY(-2px); box-shadow:0 12px 28px -8px rgba(139, 92, 246, 0.8);}
.mood-btn:active{transform:translateY(0);}
.mood-btn.alt-purple{background:linear-gradient(135deg,#c9a6f5,#8b5fe0);color:#1c0f33;box-shadow:0 8px 24px -8px rgba(139,95,224,.55);}
.mood-btn.alt-teal{background:linear-gradient(135deg,#7fe3cd,#2f9e88);color:#03231d;box-shadow:0 8px 24px -8px rgba(47,158,136,.55);}

/* ---------- LAYOUT ---------- */
.view{padding:28px;max-width:1400px;margin:0 auto; animation: fadeIn 0.3s ease;}
.view[hidden]{display:none;}
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.section-title{
  display:flex;align-items:baseline;gap:12px;margin:34px 0 14px;
}
.section-title h2{font-size:26px;color:var(--text);margin:0;}
.section-title .eyebrow{
  font-family:'Inter';font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent-glow);font-weight:700;
}
.section-title .rule{flex:1;height:1px;background:var(--line);}

/* platform pill row on shelf headers */
.platform-icon{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}

/* ---------- SHELF ---------- */
.shelf-row{display:flex;gap:16px;overflow-x:auto;padding:10px 4px 22px;scroll-snap-type:x proximity;}
.shelf-row::-webkit-scrollbar{height:6px;}

/* ---------- POSTER CARD ---------- */
.card{
  position:relative;flex:0 0 auto;width:130px;scroll-snap-align:start; /* LOCANDINA RIDOTTA DA 150 a 130 */
  border-radius:var(--radius);overflow:hidden;background:var(--surface);
  border:1px solid rgba(255,255,255,0.05);
  transition:transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s, border-color .3s;
  cursor:pointer;
}
.card:hover{transform:translateY(-8px) scale(1.04);box-shadow:var(--shadow),0 0 0 1px var(--accent);z-index:2; border-color: transparent;}
.card img{display:block;width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--surface-2);}
.card .noimg{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;padding:10px;background:linear-gradient(160deg,var(--surface),var(--surface-2));}
.card .meta{padding:10px;}
.card .title{font-size:13px;font-weight:700;line-height:1.3;margin:0 0 6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px; color: #fff;}
.card .sub{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.rating-chip{
  display:inline-flex;align-items:center;gap:3px;background:rgba(245, 158, 11, 0.15);
  color:var(--gold);border-radius:6px;padding:2px 6px;font-weight:700;font-size:11px;
}
.watched-dot{
  position:absolute;top:8px;right:8px;width:12px;height:12px;border-radius:50%;
  background:var(--green);box-shadow:0 0 0 2px var(--bg), 0 0 10px rgba(16, 185, 129, 0.8);
  display:none; z-index: 5;
}
.card.is-watched .watched-dot{display:block;}
.fav-toggle{
  position:absolute;top:6px;left:6px;width:28px;height:28px;border-radius:50%;
  background:rgba(6,9,19,0.5);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;
  opacity:0;transition:opacity .2s, background .2s, transform .15s; z-index: 5;
}
.card:hover .fav-toggle{opacity:1;}
.fav-toggle.active{opacity:1;color:var(--red);background:rgba(6,9,19,0.85); border-color:var(--red);}
.fav-toggle:active{transform:scale(.85);}

/* empty state */
.empty{
  border:1px dashed var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;color:var(--muted);
}
.empty b{color:var(--text);}

/* ---------- SEARCH & FILTERS ---------- */
.filters{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;
  background:var(--surface);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;font-weight:700;}
.field input,.field select{
  width:100%;background:var(--bg-soft);border:1px solid var(--line);color:var(--text);
  padding:12px 14px;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s, box-shadow .2s;
}
.field input:focus,.field select:focus{border-color:var(--accent); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);}
.field.range{display:flex;flex-direction:column;}
.field.range .val{color:var(--accent);font-weight:700;}
.search-actions{grid-column:1/-1;display:flex;gap:12px;justify-content:flex-end;margin-top:6px;}
.btn{
  border:1px solid var(--line);background:var(--surface-2);color:var(--text);
  padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;transition:all .2s;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover{border-color:var(--accent-glow); background: rgba(255,255,255,0.05);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{filter:brightness(1.15); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); border-color: var(--accent);}

.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:18px;margin-top:24px;}

/* ---------- TABS ---------- */
.subtabs{display:flex;gap:8px;margin-bottom:20px; background: var(--surface); padding: 6px; border-radius: 999px; width: fit-content; border: 1px solid var(--line);}
.subtabs button{
  background:transparent;border:none;color:var(--muted);
  padding:8px 20px;border-radius:999px;font-weight:700;font-size:13.5px; transition: all 0.2s;
}
.subtabs button.active{color:#fff;background:var(--accent); box-shadow: 0 2px 10px rgba(139, 92, 246, 0.3);}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(2, 4, 8, 0.85);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
.overlay.open{opacity:1;pointer-events:auto;}
.modal{
  background:var(--surface);border:1px solid rgba(255,255,255,0.05);border-radius:20px;
  max-width:860px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 40px 80px -20px rgba(0,0,0,0.9);
  transform:translateY(20px) scale(0.98);transition:transform .3s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-hero{position:relative;display:flex;gap:28px;padding:28px;}
.modal-hero img{width:180px;border-radius:12px;flex:0 0 auto;box-shadow:var(--shadow);}
.modal-close{
  position:relative;top:0;right:0;width:36px;height:36px;border-radius:50%;flex:0 0 auto;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);font-size:16px;
  pointer-events:auto;z-index:5; transition: 0.2s;
}
.modal-close:hover { background: var(--red); border-color: var(--red); color: #fff; }
.modal-sticky-header{
  position:sticky;top:0;z-index:20;background:rgba(21, 28, 51, 0.95); backdrop-filter: blur(10px);
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  padding:24px 28px 18px;border-bottom:1px solid rgba(255,255,255,0.05);
}
.modal-sticky-header h3{margin:0;font-size:28px;color:var(--text);}
.modal-sticky-header p{margin:6px 0 0;color:var(--muted);font-size:14px;}
.mood-body{padding:20px 28px 30px;}
.mood-filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:20px 0;}
.mood-actions{display:flex;gap:12px;justify-content:flex-end;margin-bottom:20px;}
.person-link{
  background:none;border:none;color:var(--accent-glow);font:inherit;font-weight:700;
  cursor:pointer;padding:0;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;
}
.person-link:hover{color:#fff;}
.close-bar{position:sticky;top:0;z-index:30;display:flex;justify-content:flex-end;padding:16px 20px 0;background:linear-gradient(var(--surface) 60%, transparent);}
.modal-info h3{font-size:34px;margin:0 0 8px; line-height: 1.1;}
.modal-info .tagrow{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 16px;}
.tagpill{background:var(--surface-2);border:1px solid var(--line);color:var(--text);font-size:12px;padding:4px 12px;border-radius:999px; font-weight: 600;}
.modal-info p.overview{font-size:14.5px;line-height:1.7;color:#d8dbe0;max-height:130px;overflow:auto; margin-bottom: 16px;}
.modal-info .cast{font-size:13px;color:var(--muted);margin-top:10px;}
.modal-actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;}
.seasons{padding:0 28px 28px;}
.seasons h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:10px 0 14px;}
.season-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;
  transition: border-color 0.2s;
}
.season-row:hover{border-color: var(--accent-glow);}
.season-row .s-name{font-size:14.5px;font-weight:600;}
.season-check{
  width:24px;height:24px;border-radius:6px;border:2px solid var(--line);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;font-weight:900;
  transition: all 0.2s;
}
.season-check.checked{background:var(--green);border-color:var(--green);color:#fff;}

/* ---------- TRAILER CONTAINER ---------- */
.trailer-container{
  position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:12px; margin-top:24px;
  display:none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--line);
}
.trailer-container.active{display:block; animation: fadeIn 0.4s ease;}
.trailer-container iframe{position:absolute; top:0; left:0; width:100%; height:100%; border:0;}

/* ---------- MOOD MODAL ---------- */
.mood-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;padding:24px 28px;}
.mood-tile{
  background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:22px 12px;
  display:flex;flex-direction:column;align-items:center;gap:10px;font-weight:700;font-size:14px;
  transition:all .2s ease;
}
.mood-tile:hover{border-color:var(--accent);transform:translateY(-4px);background:var(--surface-2); box-shadow: 0 6px 20px rgba(0,0,0,0.3);}
.mood-tile.selected{border-color:var(--accent);background:rgba(139, 92, 246, 0.1);box-shadow:0 0 0 2px var(--accent);}
.mood-tile .emoji{font-size:32px;}
.mood-result{padding:0 28px 28px;text-align:center;}

/* ---------- LOADING / TOAST ---------- */
.loader{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px;padding:30px 0; justify-content: center; width: 100%;}
.spin{width:20px;height:20px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--accent);animation:sp 0.8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--accent);color:var(--text);
  padding:12px 24px;border-radius:999px;font-size:14px;font-weight:600;
  opacity:0;pointer-events:none;transition:all .3s cubic-bezier(0.2, 0.8, 0.2, 1);z-index:400;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{text-align:center;color:var(--muted);font-size:12px;padding:40px 0 30px;letter-spacing:.04em; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px;}

/* ---------- PROFILE SCREEN ---------- */
.profile-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:40px;padding:24px;text-align:center; background: var(--bg);
}
.profile-screen h1{font-size:48px;color:var(--text);margin:0; text-transform: uppercase;}
.profile-screen p{color:var(--muted);margin:0;font-size:15px;}
.profile-list{display:flex;gap:32px;flex-wrap:wrap;justify-content:center;}
.profile-card{
  background:none;border:none;color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:10px;border-radius:18px;transition:transform .2s;
}
.profile-card:hover{transform:translateY(-6px);}
.profile-avatar{
  width:130px;height:130px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue';font-size:56px; color: #fff;
  border:3px solid transparent;transition:all .2s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.profile-card:hover .profile-avatar{border-color:var(--accent);box-shadow:0 0 0 6px rgba(139, 92, 246, 0.2), 0 12px 30px rgba(0,0,0,0.5);}
.profile-card span.pname{font-size:16px;font-weight:600;color:var(--muted); transition: 0.2s;}
.profile-card:hover span.pname{color:#fff;}
.profile-switch-btn{
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  width:38px;height:38px;border-radius:50%;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  transition: all 0.2s;
}
.profile-switch-btn:hover { border-color: var(--accent); background: var(--surface); }

@media(max-width:640px){
  .topbar{padding:14px 16px;gap:10px 12px;padding-top:calc(14px + env(safe-area-inset-top));}
  .brand{order:1;font-size:22px;}
  .brand span.txt{display:none;}
  .profile-switch-btn{order:2;margin-left:auto;}
  .nav{order:3;flex:1 1 100%;overflow-x:auto;gap:8px; padding-bottom: 4px;}
  .nav button{padding:8px 14px;font-size:13px;white-space:nowrap;}
  .mood-btn{order:4;flex:1 1 auto;padding:10px 8px;font-size:12.5px;justify-content:center;gap:6px;}
  .view{padding:20px 16px;}
  .modal-hero{flex-direction:column; padding: 20px;}
  .modal-hero img{width:100%;max-width:200px; margin: 0 auto;}
  .card { width: 110px; } /* Ancora più piccole su mobile */
  .card .title { font-size: 12px; }
}
@media(max-width:380px){
  .mood-btn span.txt-label{display:none;}
}
</style>
</head>
<body>

<div id="app">
<div class="topbar">
  <div class="brand"><span class="dot"></span><span class="txt">CineMood</span></div>
  <nav class="nav">
    <button data-view="home" class="active">Home</button>
    <button data-view="popular">🔥 Popolari</button>
    <button data-view="search">Cerca</button>
    <button data-view="favorites">Preferiti</button>
  </nav>
  <button class="mood-btn alt-purple" id="openRecommended" type="button">✨ <span class="txt-label">Consigliati</span></button>
  <button class="mood-btn alt-teal" id="openUpcoming" type="button">🆕 <span class="txt-label">Uscite</span></button>
  <button class="mood-btn" id="openMood">🎭 <span class="txt-label">Mood</span></button>
  <button class="profile-switch-btn" id="switchProfileBtn" title="Cambia profilo"></button>
</div>

<!-- HOME -->
<section class="view" id="view-home">
  <div id="platformShelves"></div>
</section>

<!-- POPOLARI -->
<section class="view" id="view-popular" hidden>
  <div class="subtabs" id="popSubtabs">
    <button data-pop="all" class="active">Tutti</button>
    <button data-pop="movie">Film</button>
    <button data-pop="tv">Serie TV</button>
  </div>
  <div class="filters">
    <div class="field">
      <label>Ordina per</label>
      <select id="pop-sort">
        <option value="popularity.desc">Popolarità</option>
        <option value="vote_average.desc">Voto più alto</option>
        <option value="primary_release_date.desc">Più recenti</option>
      </select>
    </div>
    <div class="field">
      <label>Anno</label>
      <input id="pop-year" type="number" placeholder="es. 2024" min="1900" max="2030">
    </div>
    <div class="field range">
      <label>Voto minimo <span class="val" id="pop-rating-val">0</span></label>
      <input id="pop-rating" type="range" min="0" max="9" step="0.5" value="0">
    </div>
    <div class="search-actions">
      <button class="btn primary" id="runPopular">Aggiorna / Filtra</button>
    </div>
  </div>
  <div id="popularResults" class="results-grid"></div>
</section>

<!-- SEARCH -->
<section class="view" id="view-search" hidden>
  <div class="filters">
    <div class="field" style="grid-column:1/-1;">
      <label>Cerca per titolo</label>
      <input id="f-query" placeholder="es. Dune, Breaking Bad…">
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="f-type">
        <option value="both">Film + Serie TV</option>
        <option value="movie">Solo film</option>
        <option value="tv">Solo serie TV</option>
      </select>
    </div>
    <div class="field">
      <label>Attore / Attrice</label>
      <input id="f-actor" placeholder="es. Zendaya">
    </div>
    <div class="field">

/* ================= TMDB HELPERS ================= */
async function tmdb(path, params={}){
  const url = new URL(BASE+path);
  url.searchParams.set("api_key", TMDB_KEY);
  url.searchParams.set("language", LANG);
  Object.entries(params).forEach(([k,v])=>{ if(v!==undefined && v!==null && v!=="") url.searchParams.set(k,v); });
  const res = await fetch(url);
  if(!res.ok) throw new Error("TMDB error "+res.status);
  return res.json();
}

function posterUrl(p){ return p ? IMG+p : null; }

/* ================= UI HELPERS ================= */
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 2500);
}

function isFav(mediaType, id){ return FAVORITES[mediaType].some(x=>x.id===id); }
function isWatched(mediaType, id){ return !!WATCHED[mediaType][id]; }

function toggleFavorite(item, mediaType){
  const list = FAVORITES[mediaType];
  const idx = list.findIndex(x=>x.id===item.id);
  if(idx>=0){ list.splice(idx,1); toast("Rimosso dai preferiti"); }
  else{ list.push(item); toast("❤ Aggiunto ai preferiti"); }
  persistAll(); refreshAllCardStates();
}

function toggleWatched(mediaType, id){
  WATCHED[mediaType][id] = !WATCHED[mediaType][id];
  if(!WATCHED[mediaType][id]) delete WATCHED[mediaType][id];
  persistAll(); refreshAllCardStates();
}

function refreshAllCardStates(){
  document.querySelectorAll(".card[data-id]").forEach(card=>{
    const id = Number(card.dataset.id), mt = card.dataset.mt;
    card.classList.toggle("is-watched", isWatched(mt,id));
    const favBtn = card.querySelector(".fav-toggle");
    if(favBtn) favBtn.classList.toggle("active", isFav(mt,id));
  });
}

function buildCard(item, mediaType, opts={}){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = item.id;
  card.dataset.mt = mediaType;
  if(isWatched(mediaType, item.id)) card.classList.add("is-watched");

  const poster = posterUrl(item.poster_path);
  const title = item.title || item.name || "Senza titolo";
  const date = (item.release_date || item.first_air_date || "").slice(0,4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : "—";

  card.innerHTML = `
    <span class="watched-dot"></span>
    <button class="fav-toggle ${isFav(mediaType,item.id)?'active':''}" title="Preferiti">❤</button>

async function runSearch(){
  const query = document.getElementById("f-query").value.trim();
  const type = document.getElementById("f-type").value;
  const actor = document.getElementById("f-actor").value.trim();
  const genre = document.getElementById("f-genre").value;
  const year = document.getElementById("f-year").value;
  const rating = document.getElementById("f-rating").value;
  const sort = document.getElementById("f-sort").value;
  const resultsEl = document.getElementById("searchResults");
  resultsEl.innerHTML = `<div class="loader"><div class="spin"></div>Ricerca in corso…</div>`;

  const isAnime = genre === "anime";
  try{
    let combined = [];
    if(query){
      let movies=[], tv=[];
      if(type!=="tv") movies = (await tmdb("/search/movie", { query, year: year||undefined })).results || [];
      if(type!=="movie") tv = (await tmdb("/search/tv", { query, first_air_date_year: year||undefined })).results || [];
      combined = [...movies.map(x=>({...x, media_type:"movie"})), ...tv.map(x=>({...x, media_type:"tv"}))];

      if(genre){ combined = combined.filter(x=>{ if(isAnime) return (x.genre_ids||[]).includes(16) && x.original_language==="ja"; return (x.genre_ids||[]).includes(Number(genre)); }); }
      if(rating && Number(rating)>0) combined = combined.filter(x => (x.vote_average||0) >= Number(rating));
      if(actor){
        const people = await tmdb("/search/person", { query: actor });
        const castId = people.results && people.results.length ? people.results[0].id : null;
        if(castId){
          const checks = await Promise.all(combined.map(async x=>{
            try{ const cr = await tmdb(`/${x.media_type}/${x.id}/credits`); return (cr.cast||[]).some(c=>c.id===castId) ? x : null; }
            catch(e){ return null; }
          }));
          combined = checks.filter(Boolean);
        } else { combined = []; }
      }
      if(sort==="vote_average.desc") combined.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
      else if(sort==="primary_release_date.desc") combined.sort((a,b)=>((b.release_date||b.first_air_date||"")).localeCompare(a.release_date||a.first_air_date||""));
    } else {
      let castId = null;
      if(actor){ const people = await tmdb("/search/person", { query: actor }); if(people.results && people.results.length) castId = people.results[0].id; }
      const params = (mediaType)=>{
        const p = { sort_by: sort, "vote_count.gte": 20 };
        if(castId) p.with_cast = castId;
        if(genre && !isAnime) p.with_genres = genre;
        if(isAnime){ p.with_genres = 16; p.with_original_language = "ja"; }
        if(rating && Number(rating)>0) p["vote_average.gte"] = rating;
        if(year){ if(mediaType==="movie") p.primary_release_year = year; else p.first_air_date_year = year; }
        return p;
      };
      let movies=[], tv=[];
      if(type!=="tv") movies = (await tmdb("/discover/movie", params("movie"))).results || [];
      if(type!=="movie") tv = (await tmdb("/discover/tv", params("tv"))).results || [];
      combined = [...movies.map(x=>({...x, media_type:"movie"})), ...tv.map(x=>({...x, media_type:"tv"}))];
    }
    resultsEl.innerHTML = "";
    if(!combined.length){ resultsEl.innerHTML = `<div class="empty"><b>Nessun risultato.</b><br>Prova ad allargare i filtri.</div>`; return; }
    const grid = document.createElement("div"); grid.className = "results-grid";
    combined.forEach(item=> grid.appendChild(buildCard(item, item.media_type)));
    resultsEl.appendChild(grid);
  }catch(e){ resultsEl.innerHTML = `<div class="empty">Errore durante la ricerca. Riprova.</div>`; }
}

    const watched = isWatched(mediaType, id);

    // Trova Trailer
    const trailer = (videos.results||[]).find(v => v.site === "YouTube" && (v.type === "Trailer" || v.type === "Teaser"));

    let seasonsHtml = "";
    if(mediaType==="tv" && details.seasons){
      const list = details.seasons.filter(s=>s.season_number>0);
      seasonsHtml = `
        <div class="seasons">
          <h4>Stagioni</h4>
          ${list.map(s=>{
            const flagged = (WATCHED_SEASONS[id]||[]).includes(s.season_number);
            return `<div class="season-row" data-season="${s.season_number}">
              <span class="s-name">${s.name} · ${s.episode_count} ep.</span>
              <span class="season-check ${flagged?'checked':''}">${flagged?'✓':''}</span>
            </div>`;
          }).join("")}
        </div>`;
    }

    detailModal.innerHTML = `
      <div class="close-bar"><button class="modal-close" id="detailClose" type="button">✕</button></div>
      <div class="modal-hero">
        ${poster?`<img src="${poster}" alt="${title}">`:`<div class="noimg" style="width:180px;border-radius:12px;">${title}</div>`}
        <div class="modal-info" style="width:100%;">
          <h3>${title} ${date?`<span style="color:var(--muted);font-size:20px;font-weight:400;">(${date})</span>`:""}</h3>
          <div class="tagrow">
            ${genres.map(g=>`<span class="tagpill">${g}</span>`).join("")}
            <span class="tagpill" style="background:rgba(245, 158, 11, 0.15);color:var(--gold);border:none;">★ ${details.vote_average?details.vote_average.toFixed(1):"—"}</span>
          </div>
          <p class="overview">${details.overview || "Nessuna trama disponibile."}</p>
          ${director?`<p class="cast"><b style="color:var(--muted)">Regia:</b> <button class="person-link" data-pid="${director.id}" data-pname="${director.name.replace(/"/g,'&quot;')}" data-role="crew" type="button">${director.name}</button></p>`:""}
          ${cast.length?`<p class="cast"><b style="color:var(--muted)">Cast:</b> ${cast.map(c=>`<button class="person-link" data-pid="${c.id}" data-pname="${c.name.replace(/"/g,'&quot;')}" data-role="cast" type="button">${c.name}</button>`).join(", ")}</p>`:""}
          
          <div class="modal-actions">
            ${trailer ? `<button class="btn" id="detailTrailer" style="border-color:#ef4444; color:#ef4444;">▶ Trailer</button>` : ""}
            <button class="btn ${fav?'primary':''}" id="detailFav">${fav?'❤ Preferito':'♡ Aggiungi ai preferiti'}</button>
            <button class="btn ${watched?'primary':''}" id="detailWatched" style="${watched?'background:var(--green);border-color:var(--green);':''}">${watched?'✓ Visto':'Segna come visto'}</button>
          </div>
          
          <div class="trailer-container" id="trailerContainer"></div>
        </div>
      </div>
      ${seasonsHtml}
    `;

    document.getElementById("detailClose").addEventListener("click", closeDetail);
    
    if(trailer) {
      document.getElementById("detailTrailer").addEventListener("click", () => {
        const tc = document.getElementById("trailerContainer");
        if(tc.classList.contains("active")){ tc.classList.remove("active"); tc.innerHTML = ""; }
        else { tc.classList.add("active"); tc.innerHTML = `<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`; }
      });
    }

    detailModal.querySelectorAll(".person-link").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const pid = btn.dataset.pid, pname = btn.dataset.pname, asCrew = btn.dataset.role==="crew";
        closeDetail(); openPersonWorks(pid, pname, asCrew);
      });
    });
    document.getElementById("detailFav").addEventListener("click", ()=>{
      toggleFavorite({ id, title, poster_path:details.poster_path, vote_average:details.vote_average, genre_ids:(details.genres||[]).map(g=>g.id), media_type:mediaType }, mediaType);
      openDetail(id, mediaType);
    });
    document.getElementById("detailWatched").addEventListener("click", ()=>{ toggleWatched(mediaType, id); openDetail(id, mediaType); });
    detailModal.querySelectorAll(".season-row").forEach(row=>{
      row.addEventListener("click", ()=>{
        const sNum = Number(row.dataset.season);
        WATCHED_SEASONS[id] = WATCHED_SEASONS[id] || [];
        const idx = WATCHED_SEASONS[id].indexOf(sNum);
        if(idx>=0) WATCHED_SEASONS[id].splice(idx,1); else WATCHED_SEASONS[id].push(sNum);
        persistAll();
        const chk = row.querySelector(".season-check");
        const nowFlagged = WATCHED_SEASONS[id].includes(sNum);
        chk.classList.toggle("checked", nowFlagged); chk.textContent = nowFlagged ? "✓" : "";
      });
    });
  }catch(e){
    detailModal.innerHTML = `<div style="padding:40px;text-align:center;"><div class="empty">Impossibile caricare i dettagli.</div><br><button class="btn" id="detailClose">Chiudi</button></div>`;
    document.getElementById("detailClose").addEventListener("click", closeDetail);
  }
}
function closeDetail(){
  detailOverlay.classList.remove("open");
  const tc = document.getElementById("trailerContainer");
  if(tc) { tc.innerHTML = ""; tc.classList.remove("active"); } // Ferma il video chiudendo modale
  if(returnOverlayId){ const id = returnOverlayId; returnOverlayId = null; document.getElementById(id).classList.add("open"); }
}
detailOverlay.addEventListener("click", e=>{ if(e.target===detailOverlay) closeDetail(); });

/* ================= NAV ================= */
document.querySelectorAll(".nav [data-view]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".nav [data-view]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".view").forEach(v=>v.hidden = true);
    document.getElementById("view-"+btn.dataset.view).hidden = false;
    if(btn.dataset.view==="favorites") renderFavorites();
    if(btn.dataset.view==="popular" && !document.getElementById("popularResults").innerHTML) runPopular();
  });
});

/* ================= MOOD, REC, UPCOMING (Resto del codice inalterato) ================= */
const moodOverlay = document.getElementById("moodOverlay");
let returnOverlayId = null; let selectedMoodKey = null;
document.getElementById("openMood").addEventListener("click", ()=>{ document.getElementById("moodResults").innerHTML=""; moodOverlay.classList.add("open"); });
document.getElementById("moodClose").addEventListener("click", ()=> moodOverlay.classList.remove("open"));
moodOverlay.addEventListener("click", e=>{ if(e.target===moodOverlay) moodOverlay.classList.remove("open"); });

function buildMoodGrid(){
  const grid = document.getElementById("moodGrid"); grid.innerHTML = "";
  MOODS.forEach(m=>{
    const tile = document.createElement("button"); tile.type = "button"; tile.className = "mood-tile";
    tile.innerHTML = `<span class="emoji">${m.emoji}</span><span>${m.label}</span>`;
    tile.addEventListener("click", ()=>{
      selectedMoodKey = m.key;
      document.querySelectorAll(".mood-tile").forEach(t=>t.classList.remove("selected")); tile.classList.add("selected");
    });
    grid.appendChild(tile);
  });
  const platSel = document.getElementById("mood-platform"); platSel.innerHTML = `<option value="">Tutte</option>`;
  PLATFORMS.forEach(p=>{ const o = document.createElement("option"); o.value=p.id; o.textContent=p.name; platSel.appendChild(o); });
}

document.getElementById("moodHomeBtn").addEventListener("click", ()=>{
  moodOverlay.classList.remove("open"); document.querySelectorAll(".nav [data-view]").forEach(b=>b.classList.remove("active"));
  document.querySelector('.nav [data-view="home"]').classList.add("active");
  document.querySelectorAll(".view").forEach(v=>v.hidden = true); document.getElementById("view-home").hidden = false;
});
document.getElementById("moodSearchBtn").addEventListener("click", async ()=>{
  const resultsEl = document.getElementById("moodResults");
  if(!selectedMoodKey){ resultsEl.innerHTML = `<div class="empty">Scegli prima un mood.</div>`; return; }
  const mood = MOODS.find(m=>m.key===selectedMoodKey), year = document.getElementById("mood-year").value, platform = document.getElementById("mood-platform").value, sort = document.getElementById("mood-sort").value;
  resultsEl.innerHTML = `<div class="loader"><div class="spin"></div>Ricerca in corso…</div>`;
  const baseParams = (mediaType)=>{
    const p = { with_genres: mood.genre, sort_by:"popularity.desc", "vote_count.gte": 15 };
    if(platform){ p.with_watch_providers = platform; p.watch_region = REGION; }
    if(year){ if(mediaType==="movie") p.primary_release_year = year; else p.first_air_date_year = year; }
    return p;
  };
  try{
    const pages = [1,2,3];
    const [movieResults, tvResults] = await Promise.all([ Promise.all(pages.map(pg => tmdb("/discover/movie", {...baseParams("movie"), page:pg}))), Promise.all(pages.map(pg => tmdb("/discover/tv", {...baseParams("tv"), page:pg}))) ]);
    let combined = [ ...movieResults.flatMap(r=>r.results||[]).map(x=>({...x, media_type:"movie"})), ...tvResults.flatMap(r=>r.results||[]).map(x=>({...x, media_type:"tv"})) ];
    const seen = new Set(); combined = combined.filter(x=>{ const k = x.media_type+"-"+x.id; if(seen.has(k)) return false; seen.add(k); return true; });
    if(sort==="vote_average.desc") combined.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0)); else if(sort==="year.desc") combined.sort((a,b)=>((b.release_date||b.first_air_date||"")).localeCompare(a.release_date||a.first_air_date||"")); else if(sort==="year.asc") combined.sort((a,b)=>((a.release_date||a.first_air_date||"")).localeCompare(b.release_date||b.first_air_date||""));
    resultsEl.innerHTML = "";
    if(!combined.length){ resultsEl.innerHTML = `<div class="empty">Nessun risultato.</div>`; return; }
    const grid = document.createElement("div"); grid.className = "results-grid"; combined.forEach(item=> grid.appendChild(buildCard(item, item.media_type))); resultsEl.appendChild(grid);
  }catch(e){ resultsEl.innerHTML = `<div class="empty">Errore.</div>`; }
});

/* ================= PERSON SEARCH (Semplificata per spazio) ================= */
let personWorksCache = []; let personWorksLabel = "";
async function openPersonWorks(personId, personName, asCrew){
  document.querySelectorAll(".nav [data-view]").forEach(b=>b.classList.remove("active"));
  document.querySelector('.nav [data-view="search"]').classList.add("active");
  document.querySelectorAll(".view").forEach(v=>v.hidden = true); document.getElementById("view-search").hidden = false;
  const resultsEl = document.getElementById("searchResults"); resultsEl.innerHTML = `<div class="loader"><div class="spin"></div>Caricamento titoli…</div>`;
  try{
    const credits = await tmdb(`/person/${personId}/combined_credits`);
    let list = asCrew ? (credits.crew||[]).filter(c=>c.department==="Directing") : (credits.cast||[]);
    const seen = new Set(); list = list.filter(x=>{ const k = x.media_type+"-"+x.id; if(seen.has(k) || !x.poster_path) return false; seen.add(k); return true; });
    list.sort((a,b)=>(b.popularity||0)-(a.popularity||0));
    resultsEl.innerHTML = `<h3 style="margin: 0 0 16px;">${asCrew?'Regia di':'Con'} ${personName}</h3>`;
    if(!list.length){ resultsEl.innerHTML += `<div class="empty">Nessun titolo trovato.</div>`; return; }
    const grid = document.createElement("div"); grid.className = "results-grid"; list.forEach(item=> grid.appendChild(buildCard(item, item.media_type))); resultsEl.appendChild(grid);
  }catch(e){ resultsEl.innerHTML = `<div class="empty">Errore nel caricamento.</div>`; }
}

/* ================= INIT ================= */
function getProfileFromURL(){
  const p = new URLSearchParams(location.search).get("profile"); return PROFILES.some(x=>x.name===p) ? p : null;
}
async function bootProfile(name){
  CURRENT_PROFILE = name;
  const prof = PROFILES.find(p=>p.name===name);
  const swBtn = document.getElementById("switchProfileBtn");
  swBtn.textContent = name[0]; swBtn.style.background = prof.color+"22"; swBtn.style.color = prof.color; swBtn.style.borderColor = prof.color+"55";
  await loadState(); renderFavorites(); refreshAllCardStates(); buildHome(); await loadGenres();
}
document.getElementById("switchProfileBtn").addEventListener("click", ()=> location.href = "profiles.html");
(function init(){
  const name = getProfileFromURL() || "Ricky"; // Fallback rapido per dev
  buildMoodGrid(); bootProfile(name);
})();
</script>
