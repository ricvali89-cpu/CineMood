<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CineMood — Il tuo cinema, il tuo umore</title>
<meta name="theme-color" content="#090b0f">
<meta name="description" content="Cerca film e serie TV, salva i preferiti e trova cosa guardare in base al mood.">
<!-- iOS: aggiunta a Home come app a schermo intero -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CineMood">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Android/Chrome: PWA installabile -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090b0f;
  --bg-soft:#0f1319;
  --surface:#151b23;
  --surface-2:#1c232d;
  --line:#262f3b;
  --gold:#e3a857;
  --gold-dim:#8a6a3a;
  --red:#c1443a;
  --text:#f2efe9;
  --muted:#8a93a3;
  --green:#4caf7d;
  --radius:10px;
  --shadow: 0 20px 40px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(1200px 600px at 15% -10%, #14202c 0%, var(--bg) 55%) fixed, var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{
  font-family:'Bebas Neue', 'Inter', sans-serif;
  letter-spacing:.03em;
  font-weight:400;
}
::selection{background:var(--gold);color:#111;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- TOP BAR ---------- */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:24px;
  padding:16px 28px;
  background:rgba(9,11,15,.86);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-size:26px;
  color:var(--gold);
  white-space:nowrap;
}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);}
.nav{display:flex;gap:4px;flex:1;}
.nav button{
  background:none;border:none;color:var(--muted);
  padding:9px 16px;border-radius:999px;font-size:14.5px;font-weight:600;
  transition:.2s;
}
.nav button:hover{color:var(--text);}
.nav button.active{background:var(--surface-2);color:var(--gold);}
.mood-btn{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--gold),#c98936);
  color:#161005;font-weight:800;border:none;
  padding:10px 18px;border-radius:999px;font-size:14px;
  box-shadow:0 8px 24px -8px rgba(227,168,87,.6);
  transition:transform .15s ease;
  white-space:nowrap;
}
.mood-btn:hover{transform:translateY(-2px);}
.mood-btn:active{transform:translateY(0);}

/* ---------- LAYOUT ---------- */
.view{padding:28px;max-width:1400px;margin:0 auto;}
.view[hidden]{display:none;}

.section-title{
  display:flex;align-items:baseline;gap:12px;margin:34px 0 14px;
}
.section-title h2{font-size:26px;color:var(--text);margin:0;}
.section-title .eyebrow{
  font-family:'Inter';font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold-dim);font-weight:700;
}
.section-title .rule{flex:1;height:1px;background:var(--line);}

/* platform pill row on shelf headers */
.platform-icon{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#111;}

/* ---------- SHELF ---------- */
.shelf-row{display:flex;gap:16px;overflow-x:auto;padding:6px 2px 18px;scroll-snap-type:x proximity;}
.shelf-row::-webkit-scrollbar{height:6px;}

/* ---------- POSTER CARD ---------- */
.card{
  position:relative;flex:0 0 auto;width:150px;scroll-snap-align:start;
  border-radius:var(--radius);overflow:hidden;background:var(--surface);
  border:1px solid var(--line);
  transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s;
  cursor:pointer;
}
.card:hover{transform:translateY(-6px) scale(1.03);box-shadow:var(--shadow),0 0 0 1px var(--gold-dim);z-index:2;}
.card img{display:block;width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--surface-2);}
.card .noimg{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;padding:10px;background:linear-gradient(160deg,var(--surface),var(--surface-2));}
.card .meta{padding:8px 9px 10px;}
.card .title{font-size:13px;font-weight:700;line-height:1.25;margin:0 0 4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px;}
.card .sub{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.rating-chip{
  display:inline-flex;align-items:center;gap:3px;background:rgba(227,168,87,.14);
  color:var(--gold);border-radius:5px;padding:1px 5px;font-weight:700;font-size:11px;
}
.watched-dot{
  position:absolute;top:7px;right:7px;width:11px;height:11px;border-radius:50%;
  background:var(--green);box-shadow:0 0 0 2px rgba(9,11,15,.85), 0 0 8px rgba(76,175,125,.8);
  display:none;
}
.card.is-watched .watched-dot{display:block;}
.fav-toggle{
  position:absolute;top:6px;left:6px;width:26px;height:26px;border-radius:50%;
  background:rgba(9,11,15,.65);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;
  opacity:0;transition:opacity .18s, background .18s, transform .15s;
}
.card:hover .fav-toggle{opacity:1;}
.fav-toggle.active{opacity:1;color:var(--red);background:rgba(9,11,15,.85);}
.fav-toggle:active{transform:scale(.88);}

/* empty state */
.empty{
  border:1px dashed var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;color:var(--muted);
}
.empty b{color:var(--text);}

/* ---------- SEARCH ---------- */
.filters{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;
}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;font-weight:700;}
.field input,.field select{
  width:100%;background:var(--bg-soft);border:1px solid var(--line);color:var(--text);
  padding:10px 12px;border-radius:8px;font-size:14px;outline:none;transition:border-color .15s;
}
.field input:focus,.field select:focus{border-color:var(--gold-dim);}
.field.range{display:flex;flex-direction:column;}
.field.range .val{color:var(--gold);font-weight:700;}
.search-actions{grid-column:1/-1;display:flex;gap:10px;justify-content:flex-end;margin-top:2px;}
.btn{
  border:1px solid var(--line);background:var(--surface-2);color:var(--text);
  padding:10px 18px;border-radius:8px;font-weight:700;font-size:13.5px;transition:.15s;
}
.btn:hover{border-color:var(--gold-dim);}
.btn.primary{background:var(--gold);color:#161005;border-color:var(--gold);}
.btn.primary:hover{filter:brightness(1.08);}

.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-top:22px;}

/* ---------- FAVORITES TABS ---------- */
.subtabs{display:flex;gap:8px;margin-bottom:18px;}
.subtabs button{
  background:var(--surface);border:1px solid var(--line);color:var(--muted);
  padding:8px 16px;border-radius:999px;font-weight:700;font-size:13px;
}
.subtabs button.active{color:var(--gold);border-color:var(--gold-dim);background:var(--surface-2);}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(6,7,9,.78);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:auto;}
.modal{
  background:var(--surface);border:1px solid var(--line);border-radius:16px;
  max-width:820px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 40px 80px -20px rgba(0,0,0,.8);
  transform:translateY(14px);transition:transform .2s;
}
.overlay.open .modal{transform:translateY(0);}
.modal-hero{position:relative;display:flex;gap:22px;padding:24px;}
.modal-hero img{width:160px;border-radius:10px;flex:0 0 auto;box-shadow:var(--shadow);}
.modal-close{
  position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);font-size:16px;
}
.modal-info h3{font-size:30px;margin:0 0 6px;}
.modal-info .tagrow{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px;}
.tagpill{background:var(--surface-2);border:1px solid var(--line);color:var(--muted);font-size:11.5px;padding:3px 10px;border-radius:999px;}
.modal-info p.overview{font-size:14px;line-height:1.6;color:#d8dbe0;max-height:110px;overflow:auto;}
.modal-info .cast{font-size:12.5px;color:var(--muted);margin-top:10px;}
.modal-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.seasons{padding:0 24px 24px;}
.seasons h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:6px 0 12px;}
.season-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--bg-soft);border:1px solid var(--line);border-radius:8px;margin-bottom:8px;
}
.season-row .s-name{font-size:14px;font-weight:600;}
.season-check{
  width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px;font-weight:900;
}
.season-check.checked{background:var(--green);border-color:var(--green);color:#0a1a12;}

/* ---------- MOOD MODAL ---------- */
.mood-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding:24px;}
.mood-tile{
  background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:20px 10px;
  display:flex;flex-direction:column;align-items:center;gap:8px;font-weight:700;font-size:13.5px;
  transition:.15s;
}
.mood-tile:hover{border-color:var(--gold);transform:translateY(-3px);background:var(--surface-2);}
.mood-tile .emoji{font-size:28px;}
.mood-result{padding:0 24px 24px;text-align:center;}
.mood-result .pick-card{max-width:260px;margin:14px auto 0;}

/* ---------- LOADING / TOAST ---------- */
.loader{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:20px 0;}
.spin{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--gold);animation:sp 0.8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--gold-dim);color:var(--text);
  padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;
  opacity:0;pointer-events:none;transition:.25s;z-index:400;box-shadow:var(--shadow);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{text-align:center;color:var(--muted);font-size:11.5px;padding:40px 0 20px;letter-spacing:.04em;}

/* ---------- PROFILE SCREEN ---------- */
.profile-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:40px;padding:24px;text-align:center;
}
.profile-screen h1{font-size:44px;color:var(--gold);margin:0;}
.profile-screen p{color:var(--muted);margin:0;font-size:14px;}
.profile-list{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;}
.profile-card{
  background:none;border:none;color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:6px;border-radius:16px;transition:transform .18s;
}
.profile-card:hover{transform:translateY(-4px);}
.profile-avatar{
  width:120px;height:120px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue';font-size:52px;
  border:2px solid transparent;transition:border-color .18s, box-shadow .18s;
}
.profile-card:hover .profile-avatar{border-color:var(--gold);box-shadow:0 0 0 4px rgba(227,168,87,.15);}
.profile-card span.pname{font-size:15px;font-weight:600;color:var(--muted);}
.profile-card:hover span.pname{color:var(--text);}
.profile-switch-btn{
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  width:36px;height:36px;border-radius:50%;font-weight:800;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}

@media(max-width:640px){
  .topbar{padding:12px 14px;gap:12px;}
  .nav{overflow-x:auto;}
  .nav button{padding:8px 12px;font-size:13px;white-space:nowrap;}
  .brand span.txt{display:none;}
  .view{padding:16px;}
  .modal-hero{flex-direction:column;}
  .modal-hero img{width:100%;max-width:220px;}
}
</style>
</head>
<body>

<!-- PROFILE SELECTION -->
<div class="profile-screen" id="profileScreen">
  <div>
    <h1>Chi sta guardando?</h1>
    <p>Ogni profilo ha preferiti e titoli visti tutti suoi.</p>
  </div>
  <div class="profile-list" id="profileList"></div>
</div>

<div id="app" hidden>
<div class="topbar">
  <div class="brand"><span class="dot"></span><span class="txt">CineMood</span></div>
  <nav class="nav">
    <button data-view="home" class="active">Home</button>
    <button data-view="search">Cerca</button>
    <button data-view="favorites">Preferiti</button>
  </nav>
  <button class="mood-btn" id="openMood">🎭 Mood</button>
  <button class="profile-switch-btn" id="switchProfileBtn" title="Cambia profilo"></button>
</div>

<!-- HOME -->
<section class="view" id="view-home">
  <div id="platformShelves"></div>
</section>

<!-- SEARCH -->
<section class="view" id="view-search" hidden>
  <div class="filters">
    <div class="field" style="grid-column:1/-1;">
      <label>Cerca per titolo</label>
      <input id="f-query" placeholder="es. Dune, Breaking Bad…">
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="f-type">
        <option value="both">Film + Serie TV</option>
        <option value="movie">Solo film</option>
        <option value="tv">Solo serie TV</option>
      </select>
    </div>
    <div class="field">
      <label>Attore / Attrice</label>
      <input id="f-actor" placeholder="es. Zendaya">
    </div>
    <div class="field">
      <label>Genere</label>
      <select id="f-genre"><option value="">Tutti i generi</option></select>
    </div>
    <div class="field">
      <label>Anno</label>
      <input id="f-year" type="number" placeholder="es. 2024" min="1900" max="2030">
    </div>
    <div class="field range">
      <label>Voto minimo <span class="val" id="f-rating-val">0</span></label>
      <input id="f-rating" type="range" min="0" max="9" step="0.5" value="0">
    </div>
    <div class="field">
      <label>Ordina per</label>
      <select id="f-sort">
        <option value="popularity.desc">Popolarità</option>
        <option value="vote_average.desc">Voto più alto</option>
        <option value="primary_release_date.desc">Più recenti</option>
      </select>
    </div>
    <div class="search-actions">
      <button class="btn" id="clearFilters">Pulisci</button>
      <button class="btn primary" id="runSearch">Cerca</button>
    </div>
  </div>
  <div id="searchResults"></div>
</section>

<!-- FAVORITES -->
<section class="view" id="view-favorites" hidden>
  <div class="subtabs">
    <button data-fav="movie" class="active">Film</button>
    <button data-fav="tv">Serie TV</button>
  </div>
  <div id="favGrid" class="results-grid"></div>
</section>

<footer>CineMood · dati forniti da TMDB · uso personale</footer>

</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal"></div>
</div>

<!-- MOOD MODAL -->
<div class="overlay" id="moodOverlay">
  <div class="modal" id="moodModal">
    <button class="modal-close" id="moodClose">✕</button>
    <div class="modal-hero" style="padding-bottom:0;">
      <div class="modal-info" style="flex:1;">
        <h3>Che mood hai stasera?</h3>
        <p class="overview" style="max-height:none;">Scegli come ti senti: pesco tra i tuoi preferiti quello più adatto.</p>
      </div>
    </div>
    <div class="mood-grid" id="moodGrid"></div>
    <div class="mood-result" id="moodResult"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG ================= */
const TMDB_KEY = "6e2c7242ba3e1415af239104bed17d5a";
const BASE = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w500";
const LANG = "it-IT";
const REGION = "IT";

const PLATFORMS = [
  { id: 8,   name: "Netflix",      color:"#e50914" },
  { id: 119, name: "Prime Video",  color:"#00a8e1" },
  { id: 1899,name: "HBO Max",      color:"#9b4de0" },
  { id: 350, name: "Apple TV+",    color:"#a1a1a6" },
  { id: 531, name: "Paramount+",   color:"#0064ff" },
  { id: 283, name: "Crunchyroll",  color:"#f47521" },
];

const MOODS = [
  { key:"relax",    label:"Rilassato",   emoji:"😌", genre:35 },
  { key:"hype",     label:"Carico",      emoji:"🔥", genre:28 },
  { key:"malinc",   label:"Malinconico", emoji:"🌧️", genre:18 },
  { key:"avv",      label:"Avventuroso", emoji:"🧭", genre:12 },
  { key:"rom",      label:"Romantico",   emoji:"💛", genre:10749 },
  { key:"spens",    label:"Spensierato", emoji:"🎈", genre:16 },
  { key:"tesa",     label:"Col fiato sospeso", emoji:"😬", genre:53 },
  { key:"nost",     label:"Nostalgico",  emoji:"📼", genre:14 },
  { key:"motiv",    label:"Motivato",    emoji:"💪", genre:99 },
  { key:"pensier",  label:"Contemplativo", emoji:"🌌", genre:878 },
];

const PROFILES = [
  { name:"Giuseppe", color:"#4f7cff" },
  { name:"Ricky",    color:"#e3a857" },
];
let CURRENT_PROFILE = null;

let GENRES = { movie:{}, tv:{} };

/* ================= STORAGE ================= */
const store = {
  async get(key, fallback){
    try{
      const r = await window.storage.get(key,false);
      return r ? JSON.parse(r.value) : fallback;
    }catch(e){ return fallback; }
  },
  async set(key,val){
    try{ await window.storage.set(key, JSON.stringify(val), false); }catch(e){ console.error(e); }
  }
};
let FAVORITES = { movie:[], tv:[] };       // arrays of {id,title,poster_path,vote_average,genre_ids,media_type}
let WATCHED = { movie:{}, tv:{} };          // id -> true
let WATCHED_SEASONS = {};                   // tvId -> [seasonNumbers]

function pKey(base){ return `cinemood-${base}::${CURRENT_PROFILE}`; }

async function loadState(){
  FAVORITES = await store.get(pKey("favorites"), {movie:[],tv:[]});
  WATCHED = await store.get(pKey("watched"), {movie:{},tv:{}});
  WATCHED_SEASONS = await store.get(pKey("watched-seasons"), {});
}
function persistFavorites(){ store.set(pKey("favorites"), FAVORITES); }
function persistWatched(){ store.set(pKey("watched"), WATCHED); }
function persistSeasons(){ store.set(pKey("watched-seasons"), WATCHED_SEASONS); }

/* ================= TMDB HELPERS ================= */
async function tmdb(path, params={}){
  const url = new URL(BASE+path);
  url.searchParams.set("api_key", TMDB_KEY);
  url.searchParams.set("language", LANG);
  Object.entries(params).forEach(([k,v])=>{ if(v!==undefined && v!==null && v!=="") url.searchParams.set(k,v); });
  const res = await fetch(url);
  if(!res.ok) throw new Error("TMDB error "+res.status);
  return res.json();
}

function posterUrl(p){ return p ? IMG+p : null; }

/* ================= UI HELPERS ================= */
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 2200);
}

function isFav(mediaType, id){ return FAVORITES[mediaType].some(x=>x.id===id); }
function isWatched(mediaType, id){ return !!WATCHED[mediaType][id]; }

function toggleFavorite(item, mediaType){
  const list = FAVORITES[mediaType];
  const idx = list.findIndex(x=>x.id===item.id);
  if(idx>=0){ list.splice(idx,1); toast("Rimosso dai preferiti"); }
  else{ list.push(item); toast("Aggiunto ai preferiti"); }
  persistFavorites();
  refreshAllCardStates();
}

function toggleWatched(mediaType, id){
  WATCHED[mediaType][id] = !WATCHED[mediaType][id];
  if(!WATCHED[mediaType][id]) delete WATCHED[mediaType][id];
  persistWatched();
  refreshAllCardStates();
}

function refreshAllCardStates(){
  document.querySelectorAll(".card[data-id]").forEach(card=>{
    const id = Number(card.dataset.id), mt = card.dataset.mt;
    card.classList.toggle("is-watched", isWatched(mt,id));
    const favBtn = card.querySelector(".fav-toggle");
    if(favBtn) favBtn.classList.toggle("active", isFav(mt,id));
  });
}

/* build a poster card element */
function buildCard(item, mediaType){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = item.id;
  card.dataset.mt = mediaType;
  if(isWatched(mediaType, item.id)) card.classList.add("is-watched");

  const poster = posterUrl(item.poster_path);
  const title = item.title || item.name || "Senza titolo";
  const date = (item.release_date || item.first_air_date || "").slice(0,4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : "—";

  card.innerHTML = `
    <span class="watched-dot"></span>
    <button class="fav-toggle ${isFav(mediaType,item.id)?'active':''}" title="Preferiti">❤</button>
    ${poster ? `<img loading="lazy" src="${poster}" alt="${title}">` : `<div class="noimg">${title}</div>`}
    <div class="meta">
      <p class="title">${title}</p>
      <div class="sub"><span>${date||"—"}</span><span class="rating-chip">★ ${rating}</span></div>
    </div>
  `;
  card.querySelector(".fav-toggle").addEventListener("click",(e)=>{
    e.stopPropagation();
    toggleFavorite({
      id:item.id, title:title, poster_path:item.poster_path,
      vote_average:item.vote_average, genre_ids:item.genre_ids||item.genres?.map(g=>g.id)||[],
      media_type:mediaType
    }, mediaType);
  });
  card.addEventListener("click", ()=>openDetail(item.id, mediaType));
  return card;
}

async function buildHome(){
  const wrap = document.getElementById("platformShelves");
  wrap.innerHTML = "";

        <h2>${p.name}</h2>

        <div class="rule"></div>
      </div>
      <div class="shelf-row" id="shelf-${p.id}"><div class="loader"><div class="spin"></div>Caricamento…</div></div>
    `;
    wrap.appendChild(block);

async function loadPlatformShelf(providerId){
  const el = document.getElementById("shelf-"+providerId);
  try{
    const [movies, tv] = await Promise.all([
      tmdb("/discover/movie", { watch_region:REGION, with_watch_providers:providerId, sort_by:"vote_average.desc",
        "vote_count.gte":150, page:1 }),
      tmdb("/discover/tv", { watch_region:REGION, with_watch_providers:providerId, sort_by:"vote_average.desc",
        "vote_count.gte":150, page:1 }),
    ]);
    const combined = [
      ...(movies.results||[]).slice(0,6).map(x=>({...x, media_type:"movie"})),
      ...(tv.results||[]).slice(0,6).map(x=>({...x, media_type:"tv"})),
    ].sort((a,b)=>b.vote_average-a.vote_average).slice(0,10);

    el.innerHTML = "";
    if(!combined.length){ el.innerHTML = `<div class="empty">Nessun titolo trovato per questa piattaforma.</div>`; return; }
    combined.forEach(item=> el.appendChild(buildCard(item, item.media_type)));
  }catch(e){
    console.error("Errore caricamento piattaforma", providerId, e);
    el.innerHTML = `<div class="empty">Impossibile caricare i titoli in questo momento.<br><span style="font-size:11px;opacity:.7">${(e&&e.message)||'errore di rete'} — apri la Console del browser (F12) per i dettagli, e assicurati di aver aperto il file scaricato nel browser e non nell'anteprima di Claude.</span></div>`;
  }
}

/* ================= SEARCH ================= */
async function loadGenres(){
  const [gm, gt] = await Promise.all([ tmdb("/genre/movie/list"), tmdb("/genre/tv/list") ]);
  gm.genres.forEach(g=>GENRES.movie[g.id]=g.name);
  gt.genres.forEach(g=>GENRES.tv[g.id]=g.name);

  const sel = document.getElementById("f-genre");
  const merged = {};
  [...gm.genres, ...gt.genres].forEach(g=>merged[g.id]=g.name);
  const opts = Object.entries(merged).sort((a,b)=>a[1].localeCompare(b[1]));
  opts.forEach(([id,name])=>{
    const o = document.createElement("option"); o.value=id; o.textContent=name; sel.appendChild(o);
  });
  // pseudo genere Anime
  const anime = document.createElement("option"); anime.value="anime"; anime.textContent="Anime";
  sel.appendChild(anime);
}

document.getElementById("f-rating").addEventListener("input", e=>{
  document.getElementById("f-rating-val").textContent = e.target.value;
});

async function runSearch(){
  const query = document.getElementById("f-query").value.trim();
  const type = document.getElementById("f-type").value;
  const actor = document.getElementById("f-actor").value.trim();
  const genre = document.getElementById("f-genre").value;
  const year = document.getElementById("f-year").value;
  const rating = document.getElementById("f-rating").value;
  const sort = document.getElementById("f-sort").value;
  const resultsEl = document.getElementById("searchResults");
  resultsEl.innerHTML = `<div class="loader"><div class="spin"></div>Ricerca in corso…</div>`;

  const isAnime = genre === "anime";

  try{
    let combined = [];

    if(query){
      /* ---- ricerca testuale per titolo ---- */
      let movies=[], tv=[];
      if(type!=="tv") movies = (await tmdb("/search/movie", { query, year: year||undefined })).results || [];
      if(type!=="movie") tv = (await tmdb("/search/tv", { query, first_air_date_year: year||undefined })).results || [];

      combined = [
        ...movies.map(x=>({...x, media_type:"movie"})),
        ...tv.map(x=>({...x, media_type:"tv"})),
      ];

      /* filtri applicati lato client, dato che l'endpoint di ricerca testuale non li supporta nativamente */
      if(genre){
        combined = combined.filter(x=>{
          if(isAnime) return (x.genre_ids||[]).includes(16) && x.original_language==="ja";
          return (x.genre_ids||[]).includes(Number(genre));
        });
      }
      if(rating && Number(rating)>0){
        combined = combined.filter(x => (x.vote_average||0) >= Number(rating));
      }
      if(actor){
        const people = await tmdb("/search/person", { query: actor });
        const castId = people.results && people.results.length ? people.results[0].id : null;
        if(castId){
          const checks = await Promise.all(combined.map(async x=>{
            try{
              const cr = await tmdb(`/${x.media_type}/${x.id}/credits`);
              return (cr.cast||[]).some(c=>c.id===castId) ? x : null;
            }catch(e){ return null; }
          }));
          combined = checks.filter(Boolean);
        } else {
          combined = [];
        }
      }
      if(sort==="vote_average.desc") combined.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
      else if(sort==="primary_release_date.desc") combined.sort((a,b)=>((b.release_date||b.first_air_date||"")).localeCompare(a.release_date||a.first_air_date||""));

    } else {
      /* ---- ricerca a filtri (discover) ---- */
      let castId = null;
      if(actor){
        const people = await tmdb("/search/person", { query: actor });
        if(people.results && people.results.length) castId = people.results[0].id;
      }
      const params = (mediaType)=>{
        const p = { sort_by: sort, "vote_count.gte": 20 };
        if(castId) p.with_cast = castId;
        if(genre && !isAnime) p.with_genres = genre;
        if(isAnime){ p.with_genres = 16; p.with_original_language = "ja"; }
        if(rating && Number(rating)>0) p["vote_average.gte"] = rating;
        if(year){
          if(mediaType==="movie") p.primary_release_year = year;
          else p.first_air_date_year = year;
        }
        return p;
      };
      let movies=[], tv=[];
      if(type!=="tv") movies = (await tmdb("/discover/movie", params("movie"))).results || [];
      if(type!=="movie") tv = (await tmdb("/discover/tv", params("tv"))).results || [];
      combined = [
        ...movies.map(x=>({...x, media_type:"movie"})),
        ...tv.map(x=>({...x, media_type:"tv"})),
      ];
    }

    resultsEl.innerHTML = "";
    if(!combined.length){
      resultsEl.innerHTML = `<div class="empty"><b>Nessun risultato.</b><br>Prova ad allargare i filtri o a controllare il titolo digitato.</div>`;
      return;
    }
    const grid = document.createElement("div");
    grid.className = "results-grid";
    combined.forEach(item=> grid.appendChild(buildCard(item, item.media_type)));
    resultsEl.appendChild(grid);
  }catch(e){
    resultsEl.innerHTML = `<div class="empty">Errore durante la ricerca. Riprova.</div>`;
  }
}

document.getElementById("runSearch").addEventListener("click", runSearch);
document.getElementById("f-query").addEventListener("keydown", e=>{ if(e.key==="Enter") runSearch(); });
document.getElementById("clearFilters").addEventListener("click", ()=>{
  document.getElementById("f-query").value="";
  document.getElementById("f-actor").value="";
  document.getElementById("f-genre").value="";
  document.getElementById("f-year").value="";
  document.getElementById("f-rating").value=0;
  document.getElementById("f-rating-val").textContent="0";
  document.getElementById("f-type").value="both";
  document.getElementById("searchResults").innerHTML="";
});

/* ================= DETAIL MODAL ================= */
const detailOverlay = document.getElementById("detailOverlay");
const detailModal = document.getElementById("detailModal");

async function openDetail(id, mediaType){
  detailOverlay.classList.add("open");
  detailModal.innerHTML = `<div class="loader" style="padding:40px;justify-content:center"><div class="spin"></div>Caricamento…</div>`;
  try{
    const [details, credits] = await Promise.all([
      tmdb(`/${mediaType}/${id}`),
      tmdb(`/${mediaType}/${id}/credits`)
    ]);
    const title = details.title || details.name;
    const date = (details.release_date || details.first_air_date || "").slice(0,4);
    const poster = posterUrl(details.poster_path);
    const genres = (details.genres||[]).map(g=>g.name);
    const cast = (credits.cast||[]).slice(0,5).map(c=>c.name).join(", ");
    const fav = isFav(mediaType, id);
    const watched = isWatched(mediaType, id);

    let seasonsHtml = "";
    if(mediaType==="tv" && details.seasons){
      const list = details.seasons.filter(s=>s.season_number>0);
      seasonsHtml = `
        <div class="seasons">
          <h4>Stagioni</h4>
          ${list.map(s=>{
            const flagged = (WATCHED_SEASONS[id]||[]).includes(s.season_number);
            return `<div class="season-row" data-season="${s.season_number}">
              <span class="s-name">${s.name} · ${s.episode_count} episodi</span>
              <span class="season-check ${flagged?'checked':''}">${flagged?'✓':''}</span>
            </div>`;
          }).join("")}
        </div>`;
    }

    detailModal.innerHTML = `
      <div class="modal-hero">
        <button class="modal-close" id="detailClose">✕</button>
        ${poster?`<img src="${poster}" alt="${title}">`:`<div class="noimg" style="width:160px;border-radius:10px;">${title}</div>`}
        <div class="modal-info">
          <h3>${title} ${date?`<span style="color:var(--muted);font-size:20px;">(${date})</span>`:""}</h3>
          <div class="tagrow">
            ${genres.map(g=>`<span class="tagpill">${g}</span>`).join("")}
            <span class="tagpill">★ ${details.vote_average?details.vote_average.toFixed(1):"—"}</span>
          </div>
          <p class="overview">${details.overview || "Nessuna trama disponibile."}</p>
          ${cast?`<p class="cast"><b style="color:var(--muted)">Cast:</b> ${cast}</p>`:""}
          <div class="modal-actions">
            <button class="btn ${fav?'primary':''}" id="detailFav">${fav?'❤ Nei preferiti':'♡ Aggiungi ai preferiti'}</button>
            <button class="btn ${watched?'primary':''}" id="detailWatched">${watched?'✓ Visto':'Segna come visto'}</button>
          </div>
        </div>
      </div>
      ${seasonsHtml}
    `;

    document.getElementById("detailClose").addEventListener("click", closeDetail);
    document.getElementById("detailFav").addEventListener("click", ()=>{
      toggleFavorite({
        id, title, poster_path:details.poster_path, vote_average:details.vote_average,
        genre_ids:(details.genres||[]).map(g=>g.id), media_type:mediaType
      }, mediaType);
      openDetail(id, mediaType);
    });
    document.getElementById("detailWatched").addEventListener("click", ()=>{
      toggleWatched(mediaType, id);
      openDetail(id, mediaType);
    });
    detailModal.querySelectorAll(".season-row").forEach(row=>{
      row.addEventListener("click", ()=>{
        const sNum = Number(row.dataset.season);
        WATCHED_SEASONS[id] = WATCHED_SEASONS[id] || [];
        const idx = WATCHED_SEASONS[id].indexOf(sNum);
        if(idx>=0) WATCHED_SEASONS[id].splice(idx,1);
        else WATCHED_SEASONS[id].push(sNum);
        persistSeasons();
        const chk = row.querySelector(".season-check");
        const nowFlagged = WATCHED_SEASONS[id].includes(sNum);
        chk.classList.toggle("checked", nowFlagged);
        chk.textContent = nowFlagged ? "✓" : "";
      });
    });
  }catch(e){
    detailModal.innerHTML = `<div style="padding:30px"><button class="modal-close" id="detailClose">✕</button><div class="empty">Impossibile caricare i dettagli.</div></div>`;
    document.getElementById("detailClose").addEventListener("click", closeDetail);
  }
}
function closeDetail(){ detailOverlay.classList.remove("open"); }
detailOverlay.addEventListener("click", e=>{ if(e.target===detailOverlay) closeDetail(); });

/* ================= MOOD ================= */
const moodOverlay = document.getElementById("moodOverlay");
document.getElementById("openMood").addEventListener("click", ()=>{
  document.getElementById("moodResult").innerHTML="";
  moodOverlay.classList.add("open");
});
document.getElementById("moodClose").addEventListener("click", ()=> moodOverlay.classList.remove("open"));
moodOverlay.addEventListener("click", e=>{ if(e.target===moodOverlay) moodOverlay.classList.remove("open"); });

function buildMoodGrid(){
  const grid = document.getElementById("moodGrid");
  grid.innerHTML = "";
  MOODS.forEach(m=>{
    const tile = document.createElement("button");
    tile.className = "mood-tile";
    tile.innerHTML = `<span class="emoji">${m.emoji}</span><span>${m.label}</span>`;
    tile.addEventListener("click", ()=> pickForMood(m));
    grid.appendChild(tile);
  });
}

function pickForMood(mood){
  const all = [...FAVORITES.movie, ...FAVORITES.tv];
  const resultEl = document.getElementById("moodResult");
  if(!all.length){
    resultEl.innerHTML = `<div class="empty">Non hai ancora preferiti. Aggiungine qualcuno e torna a trovarmi!</div>`;
    return;
  }
  let pool = all.filter(x => (x.genre_ids||[]).includes(mood.genre));
  if(!pool.length) pool = all;
  const pick = pool[Math.floor(Math.random()*pool.length)];
  const poster = posterUrl(pick.poster_path);
  resultEl.innerHTML = `
    <p style="color:var(--muted);font-size:13px;margin-bottom:4px;">Stasera con mood ${mood.emoji} ${mood.label}, guarda:</p>
    <div class="card pick-card" data-id="${pick.id}" data-mt="${pick.media_type}">
      <span class="watched-dot"></span>
      ${poster?`<img src="${poster}">`:`<div class="noimg">${pick.title}</div>`}
      <div class="meta"><p class="title">${pick.title}</p></div>
    </div>
    <button class="btn" style="margin-top:14px;" id="rerollMood">Riprova 🎲</button>
  `;
  const card = resultEl.querySelector(".card");
  if(isWatched(pick.media_type, pick.id)) card.classList.add("is-watched");
  card.addEventListener("click", ()=>{ moodOverlay.classList.remove("open"); openDetail(pick.id, pick.media_type); });
  document.getElementById("rerollMood").addEventListener("click", ()=>pickForMood(mood));
}

/* ================= PROFILES ================= */
function buildProfileScreen(){
  const list = document.getElementById("profileList");
  list.innerHTML = "";
  PROFILES.forEach(p=>{
    const btn = document.createElement("button");
    btn.className = "profile-card";
    btn.innerHTML = `
      <span class="profile-avatar" style="background:${p.color}22;color:${p.color};border-color:${p.color}55;">${p.name[0]}</span>
      <span class="pname">${p.name}</span>
    `;
    btn.addEventListener("click", ()=> selectProfile(p.name));
    list.appendChild(btn);
  });
}

async function selectProfile(name){
  CURRENT_PROFILE = name;
  document.getElementById("profileScreen").hidden = true;
  document.getElementById("app").hidden = false;
  const prof = PROFILES.find(p=>p.name===name);
  const swBtn = document.getElementById("switchProfileBtn");
  swBtn.textContent = name[0];
  swBtn.style.background = prof.color+"22";
  swBtn.style.color = prof.color;
  swBtn.style.borderColor = prof.color+"55";

  await loadState();
  renderFavorites();
  refreshAllCardStates();
  buildHome();
  if(!GENRES._loaded){ await loadGenres(); GENRES._loaded = true; }
  document.getElementById("searchResults").innerHTML = "";
  // torna sempre alla home quando si entra/cambia profilo
  document.querySelectorAll(".nav [data-view]").forEach(b=>b.classList.remove("active"));
  document.querySelector('.nav [data-view="home"]').classList.add("active");
  document.querySelectorAll(".view").forEach(v=>v.hidden = true);
  document.getElementById("view-home").hidden = false;
}

document.getElementById("switchProfileBtn").addEventListener("click", ()=>{
  document.getElementById("app").hidden = true;
  document.getElementById("profileScreen").hidden = false;
});

/* ================= INIT ================= */
(function init(){
  buildProfileScreen();
  buildMoodGrid();
})();
</script>
